  <style>
    body { margin: 0; font: 16px/1.6 system-ui, sans-serif; }
    #editor-card { height: 100vh; display: flex; flex-direction: column; }
    .page-content-view {
      flex: 1; overflow-y: auto; padding: 0 24px;
      scroll-behavior: auto; /* smooth-scroll abschalten → deterministische Tests */
    }
    .page-content-view p { margin: 0 0 1em; }
  </style>
</head>
<body>
  <div id="editor-card">
    <!-- Editor (Edit-Modus). -->
    <div class="page-content-view page-content-view--editing" contenteditable="true"></div>
    <!-- Versteckter View-Modus-Container. Spiegelt den realen Alpine-x-show-Zustand
         im Edit-Modus (display:none). Früher fing getScrollContainer() diesen
         Container via `:not([style*="display: none"])`-Race und verlor die
         eigentlichen Editor-Blöcke. Der Fallback muss ihn ignorieren. -->
    <div class="page-content-view" style="display: none;"></div>
  </div>

  <script type="module">
    import { focusCardMethods } from '/public/js/editor-focus.js';

    // 60 Absätze mit genug Text, dass die Container weit über die Höhe scrollt.
    const editor = document.querySelector('.page-content-view--editing');
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('p');
      p.textContent = `Absatz ${i}: Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.`;
      editor.appendChild(p);
    }

    // Minimal-Harness, das Alpine.data('editorFocusCard') nachbildet. Die
    // Sub-Komponenten-Methoden (`focusCardMethods`) werden direkt gespread;
    // Root-State (editMode, editDirty …) liegt ebenfalls am Harness, weil
    // wir `window.__app = harness` setzen — die Sub-Methoden greifen über
    // window.__app auf die "Root"-Felder zu.
    const harness = {
      ...focusCardMethods,
      // Sub-State
      _focusState: 'idle',
      _focusGen: 0,
      _focusListeners: null,
      _focusVisibleBlocks: null,
      _focusRaf: null,
      // Root-gespiegelte Felder (sub-methods greifen via window.__app)
      focusMode: false,
      editMode: true,
      showEditorCard: true,
      checkDone: false,
      editDirty: false,
      editSaving: false,
      saveOffline: false,
      lastDraftSavedAt: null,
      _figurLookupOpen: false,
      _synonymMenuOpen: false,
      _synonymPickerOpen: false,
      $nextTick: (fn) => Promise.resolve().then(fn),
      startEdit() {
        this.editMode = true;
        // Spiegelt editor-edit.js::startEdit – Enter soll <p> erzeugen,
        // nicht den Chromium-Default <div>.
        try { document.execCommand('defaultParagraphSeparator', false, 'p'); } catch {}
      },
      cancelEdit() { this.editMode = false; this.editDirty = false; },
      quickSave: async function () {
        // Default-Stub: schnell, erfolgreich. Tests überschreiben diesen
        // Slot für Save-Failure-Szenarien (quickSave = async () => { throw ... }).
        this.editSaving = true;
        await Promise.resolve();
        this.editDirty = false;
        this.editSaving = false;
      },
      _flushDraftSaveNow() {},
      _stopAutosave() {},
      _uninstallOnlineRetry() {},
      closeSynonymMenu() {},
      closeSynonymPicker() {},
      closeFigurLookup() { this._figurLookupOpen = false; },
      updatePageView() {},
      closeFindings() {},
    };

    // Smooth-Scroll-Override deaktivieren: scroll-behavior:auto in CSS reicht
    // nicht – container.scrollBy({ behavior: 'smooth' }) überschreibt es. Wir
    // patchen scrollBy, damit Tests sofort am Endwert messen können.
    const origScrollBy = HTMLElement.prototype.scrollBy;
    HTMLElement.prototype.scrollBy = function (opts) {
      if (opts && typeof opts === 'object') {
        return origScrollBy.call(this, { ...opts, behavior: 'auto' });
      }
      return origScrollBy.apply(this, arguments);
    };

    window.harness = harness;
    // Sub-Methoden greifen auf `window.__app` zu (Root-Proxy); der Harness
    // bündelt Root- und Sub-Felder in einem Objekt.
    window.__app = harness;
    window.harnessReady = true;
  </script>
</body>
</html>
