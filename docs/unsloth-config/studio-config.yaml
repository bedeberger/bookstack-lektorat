# ─────────────────────────────────────────────────────────────────────────
# Unsloth-Studio Training-Config (Studio-natives Format, Schema Dez 2025)
#
# Keys entsprechen exakt dem Schema, das Studio über „Training Config →
# Save" exportiert. Frühere Versionen dieser Datei benutzten TrainingArguments-
# Namen (num_train_epochs, per_device_train_batch_size, warmup_ratio,
# train_on_responses_only, lora.r …) — Studio ignoriert diese Keys beim
# Import still. Die Namen hier sind die einzigen, die Studio tatsächlich
# liest.
#
# Verwendung: In Studio → „Training Config → Upload" → diese Datei
# hochladen. Studio pre-fillt die Hyperparameter. Modell und Dataset werden
# weiterhin in der GUI gewählt.
#
# Ziel: Mistral-Small-3.2-24B-Instruct-2506 QLoRA auf 1× RTX 4000 Ada (20 GB
# VRAM) mit den JSONL-Exports der Fine-Tuning-Export-Karte.
#
# Vor dem Import in Studio noch in der GUI einstellen:
#   1. Dataset-Spalte: train.jsonl (Upload/Local), val.jsonl als Eval-File.
#   2. Advanced:       unsloth/Mistral-Small-3.2-24B-Instruct-2506-unsloth-bnb-4bit,
#                      Method = QLoRA.
#
# Hinweis Tokenizer: Mistral-Small-3.2 nutzt Tekken-V7 (Mistral-Common >=
# 1.6). Chat-Template rendert weiterhin [INST]/[/INST] um Assistant-Antworten,
# System-Prompts in [SYSTEM_PROMPT]/[/SYSTEM_PROMPT]. Unsloth-Studio kümmert
# sich selbst um die Masking-Marker — `train_on_completions` reicht.
#
# Hinweis fehlende Keys: Studios Schema kennt keine Entsprechung zu
# `load_best_model_at_end`, `early_stopping_patience`, `save_total_limit`,
# `bf16/fp16` (auto), `max_grad_norm`, `eval_strategy`, `save_strategy`.
# Best-Checkpoint-Auswahl und Early-Stopping musst du visuell am Loss-Chart
# entscheiden, oder auf das CLI-Script [train_book.py] ausweichen, das die
# fehlenden Mechanismen vollständig abdeckt.
# ─────────────────────────────────────────────────────────────────────────

training:
  # ─── Step-vs-Epoch-Strategie ─────────────────────────────────────────
  # max_steps=0 → Epochen-gesteuert. num_epochs=2 ist Default für
  # Welt-Internalisierung. In Studio: „Use Epochs"-Toggle aktivieren.
  max_steps: 0
  num_epochs: 2

  # ─── Batching (20-GB-VRAM-Profil für 24B) ────────────────────────────
  # 24B-Modell verträgt keine batch_size=2 mehr auf 20 GB.
  # effektive Batch = 1 × 16 = 16. VRAM-Peak ~17–19 GB.
  batch_size: 1
  gradient_accumulation_steps: 16

  # ─── Sequenzlänge ────────────────────────────────────────────────────
  # 4096 matcht Export-Filter (max_seq_tokens=4096). p95 unserer Samples
  # ≈ 1500 Tokens → 2.7× Headroom. Bei OOM auf 2048 reduzieren (24B-
  # Activations sind ~3× grösser als bei 8B).
  max_seq_length: 4096

  # ─── Optimizer & LR-Schedule ─────────────────────────────────────────
  # adamw_8bit halbiert Optimizer-State-VRAM; zusammen mit bnb-4bit der
  # Schlüssel für Mistral-Small-3.2-24B auf 20 GB. Cosine statt linear:
  # stabiler bei 2 Epochen. Studio kennt nur warmup_steps (absolut), keine
  # warmup_ratio. 20 Steps ≈ 1–3 % eines typischen Buch-Runs — Unsloth
  # patcht den LoRA-Init-Warmup zusätzlich intern.
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_steps: 20
  weight_decay: 0.01
  optim: adamw_8bit

  # ─── Packing ─────────────────────────────────────────────────────────
  # false: erhält Sample-Grenzen. Wichtig für pageCont/chapTrans/scnTrans-
  # Samples aus dem Export — Packing würde unabhängige Fortsetzungen in
  # eine Sequenz mischen.
  packing: false

  # ─── Eval + Checkpointing (Studio-Minimalschema) ─────────────────────
  # Studio steuert Eval/Save nur über die Step-Intervalle. eval_strategy/
  # save_strategy sind implizit „steps", sobald eval_steps/save_steps > 0.
  eval_steps: 200
  save_steps: 500

  # ─── Loss-Masking (wichtigster Qualitäts-Hebel) ──────────────────────
  # Studio-Schlüssel: train_on_completions (entspricht Unsloths
  # train_on_responses_only). Ohne das lernt das Modell auch aus System-
  # Prompts und User-Fragen, Buch-Stil verwässert messbar. Instruction-/
  # Response-Marker werden intern aus dem Chat-Template des gewählten
  # Modells abgeleitet — für Mistral-Small-3.2 sind das [INST]/[/INST].
  # Verifizieren vor dem Run:
  #   python -c "from unsloth import FastLanguageModel; \
  #     _, tok = FastLanguageModel.from_pretrained('unsloth/Mistral-Small-3.2-24B-Instruct-2506-unsloth-bnb-4bit', load_in_4bit=True); \
  #     print(tok.apply_chat_template([{'role':'user','content':'x'},{'role':'assistant','content':'y'}], tokenize=False))"
  train_on_completions: true

  # ─── Reproduzierbarkeit ──────────────────────────────────────────────
  random_seed: 42

  # ─── Memory-Tricks ───────────────────────────────────────────────────
  # "unsloth" statt true = Unsloths schnellere Gradient-Checkpointing-
  # Variante (~30 % Speedup gegen Standard-HF-Checkpointing).
  gradient_checkpointing: unsloth

lora:
  # ─── Rang & Alpha ────────────────────────────────────────────────────
  # r=32 ist Sweet-Spot für "Welt internalisieren". Studio-Default 16 ist
  # zu klein — verliert Kapazität für Figuren/Orte. alpha=32 = r (moderne
  # Unsloth-Empfehlung; früher 2×r). Bei 24B-OOM kann r=16 / alpha=16
  # zusätzlich VRAM sparen.
  lora_r: 32
  lora_alpha: 32

  # ─── Dropout ─────────────────────────────────────────────────────────
  # 0 ist am schnellsten dank Unsloths Fused-LoRA-Patch. Bei Over-Training
  # auf 0.05 hochsetzen.
  lora_dropout: 0

  # ─── Target-Module ───────────────────────────────────────────────────
  # Alle Attention- + MLP-Projections. Partielle Sets (nur q/v) trainieren
  # schneller, lernen aber Welt-Fakten schlechter.
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

  # ─── Welche Layer-Gruppen trainieren (Mistral-Small-3.2-spezifisch) ──
  # Mistral-Small-3.2 enthält einen Pixtral-Vision-Encoder. Für reines
  # Text-Finetuning ist vision=false Pflicht — sonst werden Vision-
  # Gewichte ohne Bilddaten angefasst (VRAM-Waste, potenziell Corruption
  # bei späterer multimodaler Nutzung). Andere Gruppen an lassen.
  finetune_vision_layers: false
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

  # RSLoRA + LoftQ bringen bei r=32 nur marginalen Effekt — aus lassen.
  use_rslora: false
  use_loftq: false
