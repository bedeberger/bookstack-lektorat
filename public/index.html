<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lektorat">
  <meta name="theme-color" content="#f7f7f5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
  <title>BookStack Lektorat</title>
  <link rel="icon" href="bookstack_lektorat_icon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <script>
    // Theme vor erstem Paint setzen (FOUC-Schutz). Gespeicherte Präferenz:
    // 'auto' (folgt System), 'light', 'dark'. Auflösung → data-theme-Attribut.
    (function () {
      var stored = null;
      try { stored = localStorage.getItem('theme'); } catch (e) {}
      var pref = (stored === 'light' || stored === 'dark' || stored === 'auto') ? stored : 'auto';
      var resolved = pref === 'auto'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : pref;
      document.documentElement.setAttribute('data-theme', resolved);
      window.__themePref = pref;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="js/app.js"></script>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body x-data="lektorat"
      @keydown.ctrl.enter.window="if (showEditorCard && !checkLoading && !focusMode) runCheck()"
      @keydown.ctrl.s.prevent.window="if (editMode) quickSave()"
      @keydown.meta.s.prevent.window="if (editMode) quickSave()">

<div class="session-banner" x-show="sessionExpired" x-cloak>
  <span class="session-banner-text" x-text="t('session.expired')"></span>
  <a class="session-banner-btn" :href="'/auth/login?returnTo=' + encodeURIComponent(location.pathname + location.search)" x-text="t('session.relogin')"></a>
</div>

<h1 @click="resetView()" class="site-title" :title="t('app.titleReset')">
  <img src="bookstack_lektorat_icon.svg" alt="" class="site-logo" width="64" height="64">
  BookStack Lektorat
</h1>
<div class="dev-banner" x-show="devMode" x-cloak x-text="t('dev.banner')"></div>
<div class="site-header-row">
  <p class="subtitle"><span x-text="t('app.subtitle')"></span> <span class="provider-badge" x-text="apiProvider === 'ollama' ? '· Ollama: ' + ollamaModel : apiProvider === 'llama' ? '· Llama: ' + llamaModel : '· Claude: ' + claudeModel"></span></p>
  <div class="user-info" x-show="currentUser">
    <span class="user-email" x-text="currentUser?.name || currentUser?.email"></span>
    <div class="komplett-status-wrap" @click.outside="showKomplettStatus = false" @mouseenter="if (alleAktualisierenLoading) showKomplettStatus = true" :data-lastrun="(!alleAktualisierenLoading && alleAktualisierenLastRun) ? t('common.asOf', { date: alleAktualisierenLastRun }) : null">
      <button class="job-stats-btn" @click="alleAktualisieren()" :disabled="alleAktualisierenLoading || !selectedBookId" :title="t('header.updateAllTitle')">
        <span x-show="alleAktualisierenLoading" class="spinner"></span>
        <span x-text="t('header.updateAll')"></span>
      </button>
      <button class="cache-clear-btn" @click="clearChapterCache()" :disabled="alleAktualisierenLoading || !selectedBookId" :title="t('header.clearCacheTitle')" x-text="t('header.clearCache')"></button>
      <div class="komplett-status-panel" x-show="showKomplettStatus" x-cloak>
        <div class="komplett-status-title" x-text="t('komplett.title')"></div>
        <div class="progress-bar-wrap komplett-progress-bar-wrap">
          <div class="progress-bar" :style="`width: ${alleAktualisierenProgress}%`"></div>
        </div>
        <div class="komplett-progress-label">
          <span x-text="alleAktualisierenStatus || t('komplett.done')"></span>
          <span x-show="alleAktualisierenTokIn > 0 || alleAktualisierenTokOut > 0" class="komplett-tokens" x-text="`↑${_fmtTok(alleAktualisierenTokIn)} ↓${_fmtTok(alleAktualisierenTokOut)}${alleAktualisierenTps ? ' · ' + Math.round(alleAktualisierenTps) + ' tok/s' : ''}`"></span>
        </div>
        <ul class="komplett-phase-list">
          <template x-for="phase in _komplettPhasen()">
            <li class="komplett-phase-item" :class="{ 'is-done': phase.done, 'is-active': phase.active }">
              <span class="komplett-phase-icon" x-text="phase.done ? '✓' : (phase.active ? '→' : '○')"></span>
              <span x-text="phase.label"></span>
            </li>
          </template>
        </ul>
      </div>
    </div>
    <div class="job-stats-wrap" @click.outside="showJobStats = false">
      <button class="job-stats-btn" :class="{ 'job-stats-btn--active': showJobStats }" @click="toggleJobStats()" :title="t('header.timesTitle')" x-text="t('header.times')"></button>
      <div class="job-stats-panel" x-show="showJobStats" x-cloak>
        <div class="job-stats-title" x-text="t('jobStats.title')"></div>
        <div x-show="!jobStats" class="job-stats-loading" x-text="t('jobStats.loading')"></div>
        <div x-show="jobStats && jobStats.length === 0" class="job-stats-empty" x-text="t('jobStats.empty')"></div>
        <table x-show="jobStats && jobStats.length > 0" class="job-stats-table">
          <thead>
            <tr>
              <th x-text="t('jobStats.col.type')"></th>
              <th :title="t('jobStats.col.avgDurationTitle')" x-text="t('jobStats.col.avgDuration')"></th>
              <th :title="t('jobStats.col.avgTokensTitle')" x-text="t('jobStats.col.avgTokens')"></th>
              <th x-text="t('jobStats.col.lastRun')"></th>
              <th :title="t('jobStats.col.runsTitle')" x-text="t('jobStats.col.runs')"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="row in jobStats" :key="row.type">
              <tr>
                <td x-text="t(row.typeLabel)"></td>
                <td x-text="row.avgDurationFmt"></td>
                <td x-text="row.avgTokensFmt"></td>
                <td x-text="row.lastRunFmt"></td>
                <td>
                  <span x-text="row.count"></span>
                  <span x-show="row.errorCount > 0" class="job-stats-errors" x-text="' / ' + row.errorCount + ' ✕'"></span>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
    <button class="theme-toggle" @click="cycleTheme()" :title="t('theme.cycleTitle', { label: _themeLabel() })" x-text="_themeLabel()"></button>
    <button class="theme-toggle" :class="{ 'theme-toggle--active': showUserSettingsCard }" @click="toggleUserSettingsCard()" :title="t('header.profileTitle')" x-text="t('header.profile')"></button>
    <a href="/auth/logout" class="logout-link" x-text="t('header.logout')"></a>
  </div>
</div>

<!-- BookStack Token Setup -->
<div class="card token-setup-card" x-show="showTokenSetup" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="t('tokenSetup.title')"></span>
  </div>
  <p class="token-setup-desc">
    <span x-text="t('tokenSetup.desc')"></span><br>
    <a :href="bookstackUrl + '/my-account/api-tokens'" target="_blank" x-show="bookstackUrl" x-text="t('tokenSetup.openLink')"></a>
    <span x-show="!bookstackUrl" x-text="t('tokenSetup.fallbackText')"></span>
  </p>
  <div class="token-setup-fields">
    <label>
      <span x-text="t('tokenSetup.tokenId')"></span>
      <input type="text" x-model="tokenSetupId" :placeholder="t('tokenSetup.tokenId')" autocomplete="off" spellcheck="false">
    </label>
    <label>
      <span x-text="t('tokenSetup.tokenSecret')"></span>
      <input type="password" x-model="tokenSetupPw" :placeholder="t('tokenSetup.tokenSecret')" autocomplete="off">
    </label>
  </div>
  <p class="token-setup-error" x-show="tokenSetupError" x-text="tokenSetupError"></p>
  <div class="row">
    <button @click="saveBookstackToken()" :disabled="tokenSetupLoading">
      <span x-show="tokenSetupLoading" class="spinner"></span>
      <span x-text="tokenSetupLoading ? t('common.saving') : t('common.save')"></span>
    </button>
  </div>
</div>

<!-- Bücherliste & Seitenauswahl -->
<div class="card" x-show="showBookCard" x-cloak>
  <label x-text="t('book.label')"></label>
  <div class="row book-selector-row">
    <div x-data="combobox(t('book.chooseBook'))"
         x-modelable="value" x-model="selectedBookId"
         x-effect="options = books.map(b => ({value: String(b.id), label: b.name}))"
         @combobox-change="bookReviewHistory = []; selectedBookReviewId = null; loadPages();"
         @click.outside="close()"
         @keydown="onKeydown($event)"
         class="combobox-wrap">
    </div>
    <a :href="selectedBookUrl || '#'" target="_blank" rel="noopener" class="btn-bookstack-link" :class="{ 'btn-bookstack-link--hidden': !selectedBookUrl }" :tabindex="selectedBookUrl ? 0 : -1" :aria-hidden="!selectedBookUrl" :title="t('book.openInBookstack')" x-text="t('book.bookstack')"></a>
  </div>

  <!-- Feature-Tiles: Buchanalyse -->
  <div class="feature-tiles">
    <button class="feature-tile" :class="{ 'feature-tile--active': showBookReviewCard }" @click="toggleBookReviewCard()">
      <span class="feature-tile-title" x-text="t('tile.review')"></span>
      <span class="feature-tile-desc" x-text="t('tile.review.desc')"></span>
    </button>
    <button class="feature-tile" :class="{ 'feature-tile--active': showFiguresCard }" @click="toggleFiguresCard()" :title="t('tile.figuren.title')">
      <span class="feature-tile-title" x-text="t('tile.figuren')"></span>
      <span class="feature-tile-desc" x-text="t('tile.figuren.desc')"></span>
    </button>
    <button class="feature-tile" :class="{ 'feature-tile--active': showSzenenCard }" @click="toggleSzenenCard()" :title="t('tile.szenen.title')">
      <span class="feature-tile-title" x-text="t('tile.szenen')"></span>
      <span class="feature-tile-desc" x-text="t('tile.szenen.desc')"></span>
    </button>
    <button class="feature-tile" :class="{ 'feature-tile--active': showBookStatsCard }" @click="toggleBookStatsCard()" :title="t('tile.stats.title')">
      <span class="feature-tile-title" x-text="t('tile.stats')"></span>
      <span class="feature-tile-desc" x-text="t('tile.stats.desc')"></span>
    </button>
    <button class="feature-tile" :class="{ 'feature-tile--active': showBookChatCard }" @click="toggleBookChatCard()" :disabled="!pages.length" :title="t('tile.bookchat.title')">
      <span class="feature-tile-title" x-text="t('tile.bookchat')"></span>
      <span class="feature-tile-desc" x-text="t('tile.bookchat.desc')"></span>
    </button>
    <button class="feature-tile" :class="{ 'feature-tile--active': showEreignisseCard }" @click="toggleEreignisseCard()" :title="t('tile.events.title')">
      <span class="feature-tile-title" x-text="t('tile.events')"></span>
      <span class="feature-tile-desc" x-text="t('tile.events.desc')"></span>
    </button>
    <button class="feature-tile" :class="{ 'feature-tile--active': showOrteCard }" @click="toggleOrteCard()" :title="t('tile.orte.title')">
      <span class="feature-tile-title" x-text="t('tile.orte')"></span>
      <span class="feature-tile-desc" x-text="t('tile.orte.desc')"></span>
    </button>
    <button class="feature-tile" :class="{ 'feature-tile--active': showKontinuitaetCard }" @click="toggleKontinuitaetCard()" :title="t('tile.kontinuitaet.title')">
      <span class="feature-tile-title" x-text="t('tile.kontinuitaet')"></span>
      <span class="feature-tile-desc" x-text="t('tile.kontinuitaet.desc')"></span>
    </button>
    <button class="feature-tile" :class="{ 'feature-tile--active': showBookSettingsCard }" @click="toggleBookSettingsCard()" :title="t('tile.bookSettings.title')">
      <span class="feature-tile-title" x-text="t('tile.bookSettings')"></span>
      <span class="feature-tile-desc" x-text="t('tile.bookSettings.desc')"></span>
    </button>
  </div>

</div>

<div class="layout">
<div class="layout-sidebar">

<!-- Seitenbaum -->
<div class="card">
  <div class="card-header">
    <span class="card-title" x-text="t('sidebar.pagesOf', { name: selectedBookName })"></span>
    <div class="card-actions">
      <button @click="loadPages()" x-text="t('sidebar.loadPages')"></button>
      <button @click="batchCheck()" :disabled="!pages.length" :title="t('sidebar.checkAllTitle')" x-text="t('sidebar.checkAll')"></button>
    </div>
  </div>
  <!-- Suche -->
  <div class="search-wrap">
    <input type="text" x-model="pageSearch" :placeholder="t('sidebar.searchPage')" class="page-search">
  </div>
  <div x-show="!pageSearch" class="btn-group">
    <button @click="tree.forEach(c => c.open = true)" class="btn-sm" x-text="t('sidebar.expandAll')"></button>
    <button @click="tree.forEach(c => c.open = false)" class="btn-sm" x-text="t('sidebar.collapseAll')"></button>
    <span x-show="Object.keys(tokEsts).length > 0" class="tok-totals">
      <span class="tok-badge tok-neutral" x-text="'∑ ' + Object.values(tokEsts).reduce((a,b)=>a+b.tok,0).toLocaleString(uiLocale === 'en' ? 'en-US' : 'de-CH') + ' ' + t('bookstats.unit.t')"></span>
      <span class="tok-badge tok-neutral" x-text="'∑ ' + Object.values(tokEsts).reduce((a,b)=>a+b.words,0).toLocaleString(uiLocale === 'en' ? 'en-US' : 'de-CH') + ' ' + t('bookstats.unit.w')"></span>
      <span class="tok-badge tok-neutral" x-text="'∑ ' + Object.values(tokEsts).reduce((a,b)=>a+b.chars,0).toLocaleString(uiLocale === 'en' ? 'en-US' : 'de-CH') + ' ' + t('bookstats.unit.z')"></span>
    </span>
  </div>
  <!-- Batch-Fortschritt -->
  <div x-show="batchLoading || batchStatus" class="batch-wrap">
    <div class="progress-bar-wrap" x-show="batchLoading">
      <div class="progress-bar" :style="'width:' + batchProgress + '%'"></div>
    </div>
    <div class="batch-status" x-html="batchStatus"></div>
  </div>
  <template x-for="item in filteredTree" :key="item.id">
    <div>
      <template x-if="item.type === 'chapter'">
        <div class="tree-chapter">
          <div class="tree-chapter-header" :class="{ disabled: item.pages.length === 0 }" @click="if (!pageSearch && item.pages.length > 0) item.open = !item.open">
            <span class="tree-chevron" :class="{ open: item.open }" x-show="item.pages.length > 0">›</span>
            <span x-text="item.name"></span>
            <span class="tree-chapter-meta">
              <span class="tag" x-show="item.pages.length > 1" x-text="t('sidebar.pagesCount', { n: item.pages.length })"></span>
              <template x-if="item.pages.length > 1 && chapterStats(item)">
                <span class="tok-badge tok-neutral"
                  x-text="(() => { const s = chapterStats(item); return s.chars >= 1000 ? '~' + Math.round(s.chars/1000) + 'k Z' : s.chars + ' Z'; })()"
                  @mouseenter.stop="const r=$el.getBoundingClientRect(); tokLegendPos={x:r.left,y:r.top}; tokTooltipData={...chapterStats(item), _chapterOnly: true}; showTokLegend=true"
                  @mouseleave.stop="showTokLegend=false; tokTooltipData=null"></span>
              </template>
            </span>
          </div>
          <div x-show="item.open">
            <template x-for="page in item.pages" :key="page.id">
              <div class="page-item page-item-indent" :class="{ selected: currentPage?.id === page.id, disabled: tokEsts[page.id] && tokEsts[page.id].words === 0 }" @click="if (!(tokEsts[page.id] && tokEsts[page.id].words === 0)) selectPage(page)">
                <span x-text="page.name"></span>
                <span x-show="tokEsts[page.id]" class="tok-stats">
                  <template x-if="tokEsts[page.id]?.words > 0">
                    <span class="tok-stats-wrap">
                      <span class="tok-badge tok-neutral"
                        x-text="tokEsts[page.id]?.chars >= 1000 ? '~' + Math.round(tokEsts[page.id].chars/1000) + 'k Z' : tokEsts[page.id]?.chars + ' Z'"
                        @mouseenter.stop="const r=$el.getBoundingClientRect(); tokLegendPos={x:r.left,y:r.top}; tokTooltipData=tokEsts[page.id]; showTokLegend=true"
                        @mouseleave.stop="showTokLegend=false; tokTooltipData=null"></span>
                    </span>
                  </template>
                  <template x-if="tokEsts[page.id] && tokEsts[page.id].words === 0">
                    <span class="tok-badge tok-empty" x-text="t('sidebar.empty')"></span>
                  </template>
                </span>
              </div>
            </template>
          </div>
        </div>
      </template>
      <template x-if="item.type === 'page'">
        <div class="page-item" :class="{ selected: currentPage?.id === item.page.id }" @click="selectPage(item.page)">
          <span x-text="item.name"></span>
          <span x-show="tokEsts[item.page.id]" class="tok-stats">
            <template x-if="tokEsts[item.page.id]?.words > 0">
              <span class="tok-stats-wrap">
                <span class="tok-badge tok-neutral"
                  x-text="tokEsts[item.page.id]?.chars >= 1000 ? '~' + Math.round(tokEsts[item.page.id].chars/1000) + 'k Z' : tokEsts[item.page.id]?.chars + ' Z'"
                  @mouseenter.stop="const r=$el.getBoundingClientRect(); tokLegendPos={x:r.left,y:r.top}; tokTooltipData=tokEsts[item.page.id]; showTokLegend=true"
                  @mouseleave.stop="showTokLegend=false; tokTooltipData=null"></span>
              </span>
            </template>
            <template x-if="tokEsts[item.page.id] && tokEsts[item.page.id].words === 0">
              <span class="tok-badge tok-empty">leer</span>
            </template>
          </span>
        </div>
      </template>
    </div>
  </template>
  <div x-show="filteredTree.length === 0 && pageSearch" class="muted-msg muted-msg--sm" x-text="t('sidebar.noPagesFound')"></div>
</div>

</div><!-- end layout-sidebar -->
<div class="layout-main">
<div id="partial-buchreview"></div>
<div id="partial-figuren"></div>
<div id="partial-szenen"></div>
<div id="partial-ereignisse"></div>
<div id="partial-orte"></div>
<div id="partial-kontinuitaet"></div>
<div id="partial-bookstats"></div>
<div class="editor-chat-wrap" :class="{ 'editor-chat-split': showEditorCard && showChatCard }">
  <div id="partial-editor"></div>
  <div id="partial-chat"></div>
</div>
<div id="partial-book-settings"></div>
<div id="partial-user-settings"></div>

</div><!-- end layout-main -->
</div><!-- end layout -->

<!-- Token-Badge Tooltip (fixed, kein Layout-Einfluss) -->
<div x-show="showTokLegend"
     x-transition:enter="tok-tt-enter" x-transition:enter-start="tok-tt-hidden" x-transition:enter-end="tok-tt-visible"
     x-transition:leave="tok-tt-enter" x-transition:leave-start="tok-tt-visible" x-transition:leave-end="tok-tt-hidden"
     :style="`left:${tokLegendPos.x}px; top:${tokLegendPos.y - 8}px`"
     class="tok-tooltip"
     @mouseleave="showTokLegend=false; tokTooltipData=null">
  <div class="tok-tt-row" x-text="tokTooltipData ? t('tok.words', { n: (tokTooltipData.words >= 1000 ? '~' + Math.round(tokTooltipData.words/1000) + 'k' : tokTooltipData.words) }) : ''"></div>
  <div class="tok-tt-row" x-show="tokTooltipData && !tokTooltipData._chapterOnly" x-text="tokTooltipData ? t('tok.tokens', { n: (tokTooltipData.tok >= 1000 ? Math.round(tokTooltipData.tok/1000) + 'k' : tokTooltipData.tok) }) : ''"></div>
</div>

<!-- Job-Queue Footer -->
<div class="job-queue-bar" x-show="jobQueueItems.length > 0" x-cloak>
  <span class="job-queue-label" x-text="t('jobQueue.label')"></span>
  <template x-for="job in jobQueueItems" :key="job.id">
    <div class="job-queue-pill" :class="'job-queue-pill--' + job.status" @click="navigateToJob(job)" :title="t('jobQueue.jumpTo')">
      <span class="job-queue-pill-label" x-text="t(job.label, job.labelParams)"></span>
      <span class="job-queue-pill-status" x-text="t(job.statusText, job.statusParams)"></span>
      <template x-if="job.status === 'running' && job.progress > 0">
        <span class="job-queue-pill-progress" x-text="job.progress + '%'"></span>
      </template>
      <button class="job-queue-cancel-btn" @click.stop="cancelJob(job.id)" :title="t('jobQueue.cancel')">&#x2715;</button>
    </div>
  </template>
</div>

</body>
</html>
