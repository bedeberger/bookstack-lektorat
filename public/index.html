<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookStack Lektorat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>BookStack Lektorat</h1>
<p class="subtitle">KI-gestützte Rechtschreibprüfung &amp; Stilanalyse</p>


<div class="card" id="book-card" style="display:none">
  <label>Buch</label>
  <div class="row" style="margin-bottom:12px;">
    <select id="book-select"></select>
    <button onclick="loadPages()">Seiten laden</button>
    <button onclick="runBookReview()" id="btn-book-review">Buch bewerten</button>
  </div>
  <div id="pages-list"></div>
</div>

<div class="card" id="book-review-card" style="display:none">
  <div class="card-header">
    <span class="card-title" id="book-review-title">Buchbewertung</span>
  </div>
  <div id="book-review-status" class="muted-msg"></div>
  <div id="book-review-out"></div>
</div>

<div class="card" id="editor-card" style="display:none">
  <div class="card-header">
    <div>
      <span class="card-title" id="page-title-label">–</span>
      <span class="tag" id="page-id-tag" style="margin-left:6px;"></span>
    </div>
    <div style="display:flex; gap:6px;">
      <button onclick="runCheck()" id="btn-check">Prüfen ↗</button>
      <button class="success" onclick="saveCorrections()" id="btn-save" style="display:none">Korrekturen speichern</button>
    </div>
  </div>
  <div id="status"></div>
  <div id="analysis-out" style="margin-top:1rem;"></div>
</div>

<script>
const CLAUDE_API = '/claude';
const CLAUDE_MODEL = 'claude-sonnet-4-6';

let currentPage = null;
let correctedHtml = null;
let authToken = '';

function getAuth() {
  return authToken;
}

function setStatus(msg, spinner) {
  document.getElementById('status').innerHTML = spinner
    ? `<span class="spinner"></span>${msg}` : msg;
}

async function bsGet(path) {
  const r = await fetch('/api/' + path, { headers: { Authorization: getAuth() } });
  if (!r.ok) throw new Error('BookStack API Fehler ' + r.status);
  return r.json();
}

async function bsPut(path, body) {
  const r = await fetch('/api/' + path, {
    method: 'PUT',
    headers: { Authorization: getAuth(), 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error('BookStack API Fehler ' + r.status);
  return r.json();
}

async function loadBooks() {
  try {
    setStatus('Verbinde mit BookStack…', true);
    const data = await bsGet('books');
    const sel = document.getElementById('book-select');
    sel.innerHTML = '';
    data.data.forEach(b => {
      const o = document.createElement('option');
      o.value = b.id;
      o.textContent = b.name;
      sel.appendChild(o);
    });
    document.getElementById('book-card').style.display = '';
    setStatus(data.data.length + ' Buch/Bücher gefunden.');
    if (data.data.length === 1) loadPages();
  } catch(e) {
    console.error('[loadBooks]', e);
    setStatus('Fehler: ' + e.message);
  }
}

async function loadPages() {
  const bookId = document.getElementById('book-select').value;
  try {
    setStatus('Lade Seiten…', true);
    const [chapters, pages] = await Promise.all([
      bsGet('chapters?book_id=' + bookId),
      bsGet('pages?book_id=' + bookId)
    ]);
    const chMap = {};
    const sortedChapters = [...chapters.data].sort((a, b) => a.priority - b.priority);
    sortedChapters.forEach(c => chMap[c.id] = c.name);

    // Seiten nach Kapitel-Reihenfolge, dann nach priority innerhalb des Kapitels sortieren
    const chapterOrder = {};
    sortedChapters.forEach((c, i) => chapterOrder[c.id] = i);

    const sortedPages = [...pages.data].sort((a, b) => {
      const aChOrder = a.chapter_id ? (chapterOrder[a.chapter_id] ?? 999) : -1;
      const bChOrder = b.chapter_id ? (chapterOrder[b.chapter_id] ?? 999) : -1;
      if (aChOrder !== bChOrder) return aChOrder - bChOrder;
      return a.priority - b.priority;
    });

    const list = document.getElementById('pages-list');
    list.innerHTML = '';
    sortedPages.forEach(p => {
      const div = document.createElement('div');
      div.className = 'page-item';
      div.innerHTML = `<span style="font-size:14px;">${p.name}</span><span class="tag">${p.chapter_id ? (chMap[p.chapter_id] || 'Kapitel') : 'Direkt'}</span>`;
      div.onclick = () => selectPage(p, div);
      list.appendChild(div);
    });
    setStatus('');
  } catch(e) {
    console.error('[loadPages]', e);
    setStatus('Fehler: ' + e.message);
  }
}

async function selectPage(p, el) {
  document.querySelectorAll('.page-item').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
  currentPage = p;
  correctedHtml = null;
  document.getElementById('editor-card').style.display = '';
  document.getElementById('page-title-label').textContent = p.name;
  document.getElementById('page-id-tag').textContent = 'ID ' + p.id;
  document.getElementById('btn-save').style.display = 'none';
  document.getElementById('analysis-out').innerHTML =
    '<span class="muted-msg"><span class="spinner"></span>Vorschau lädt…</span>';
  setStatus('');
  try {
    const pageData = await bsGet('pages/' + p.id);
    const text = htmlToText(pageData.html).trim();
    const preview = text.length > 600 ? text.slice(0, 600) + ' …' : text;
    document.getElementById('analysis-out').innerHTML = preview
      ? `<div class="preview-text">${escHtml(preview)}</div><div class="preview-hint">Vorschau · «Prüfen» starten für Lektorat</div>`
      : '<span class="muted-msg">Seite ist leer. «Prüfen» starten.</span>';
  } catch(e) {
    console.error('[selectPage preview]', e);
    document.getElementById('analysis-out').innerHTML =
      '<span class="muted-msg">Seite ausgewählt. «Prüfen» starten.</span>';
  }
}

function htmlToText(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}

async function runCheck() {
  if (!currentPage) return;
  const btn = document.getElementById('btn-check');
  btn.disabled = true;
  correctedHtml = null;
  document.getElementById('btn-save').style.display = 'none';
  document.getElementById('analysis-out').innerHTML = '';
  setStatus('Lade Seiteninhalt…', true);

  try {
    const pageData = await bsGet('pages/' + currentPage.id);
    const html = pageData.html;
    const text = htmlToText(html);

    setStatus('Claude analysiert…', true);

    const prompt = `Du bist ein deutschsprachiger Lektor für literarische Texte aus der Schweiz (Helvetismen wie "grösseres", "Strasse" etc. sind korrekt und sollen NICHT geändert werden).

Analysiere diesen Text auf:
1. Rechtschreibfehler
2. Grammatikfehler
3. Stilistische Anmerkungen (nur wenn auffällig)

Antworte NUR mit einem JSON-Objekt, kein Markdown, keine Erklärungen davor oder danach:
{
  "fehler": [
    {
      "typ": "rechtschreibung|grammatik|stil",
      "original": "das fehlerhafte Wort oder die fehlerhafte Phrase",
      "korrektur": "die korrekte Version",
      "kontext": "der Satz in dem der Fehler vorkommt (gekürzt)",
      "erklaerung": "kurze Erklärung auf Deutsch"
    }
  ],
  "korrekturen_html": "vollständiges korrigiertes HTML – behalte ALLE Tags exakt bei, ändere nur fehlerhafte Textstellen",
  "stilanalyse": "2-3 Sätze Stilanalyse",
  "fazit": "ein Satz Gesamtfazit"
}

Originaltext:
${text}

Original-HTML (für korrekturen_html):
${html}`;

    const resp = await fetch(CLAUDE_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: CLAUDE_MODEL,
        max_tokens: 8000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await resp.json();
    if (data.type === 'error') {
      throw new Error('Claude API Fehler: ' + (data.error?.message || JSON.stringify(data.error)));
    }
    const raw = (data.content || []).map(b => b.text || '').join('');
    const clean = raw.replace(/```json\s*|```/g, '').trim();

    let result;
    try {
      result = JSON.parse(clean);
    } catch(e) {
      throw new Error('Claude-Antwort konnte nicht geparst werden: ' + e.message + '\n\nRohantwort: ' + raw.slice(0, 300));
    }

    correctedHtml = result.korrekturen_html || html;

    const fehler = result.fehler || [];
    const errors = fehler.filter(f => f.typ === 'rechtschreibung' || f.typ === 'grammatik');
    const styles = fehler.filter(f => f.typ === 'stil');

    let out = '';

    if (errors.length === 0) {
      out += `<div class="finding ok"><span class="badge badge-ok">✓ Fehlerfrei</span> &nbsp;Keine Rechtschreib- oder Grammatikfehler gefunden.</div>`;
    } else {
      out += `<div class="section-heading">${errors.length} Fehler gefunden</div>`;
      errors.forEach(f => {
        out += `<div class="finding error">
          <span class="badge badge-err">${f.typ}</span>
          &nbsp;<del>${escHtml(f.original)}</del> → <ins>${escHtml(f.korrektur)}</ins>
          <div class="finding-context">«${escHtml(f.kontext)}»</div>
          <div class="finding-explanation">${escHtml(f.erklaerung)}</div>
        </div>`;
      });
    }

    if (styles.length > 0) {
      out += `<div class="section-heading-top">Stilanmerkungen</div>`;
      styles.forEach(f => {
        out += `<div class="finding style">
          <span class="badge badge-warn">Stil</span>
          &nbsp;${escHtml(f.erklaerung)}
          ${f.original ? `<div class="finding-explanation" style="margin-top:4px;">«${escHtml(f.original)}»</div>` : ''}
        </div>`;
      });
    }

    if (result.stilanalyse) {
      out += `<div class="stilbox"><div class="stilbox-title">Stilanalyse</div>${escHtml(result.stilanalyse)}</div>`;
    }
    if (result.fazit) {
      out += `<div class="fazit">${escHtml(result.fazit)}</div>`;
    }

    document.getElementById('analysis-out').innerHTML = out;

    if (errors.length > 0) {
      document.getElementById('btn-save').style.display = '';
    }

    setStatus('Analyse abgeschlossen.');
  } catch(e) {
    console.error('[runCheck]', e);
    document.getElementById('analysis-out').innerHTML =
      `<span class="error-msg">Fehler: ${e.message}</span>`;
    setStatus('');
  }

  btn.disabled = false;
}

async function saveCorrections() {
  if (!correctedHtml || !currentPage) return;
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  setStatus('Speichere in BookStack…', true);
  try {
    await bsPut('pages/' + currentPage.id, { html: correctedHtml, name: currentPage.name });
    setStatus('✓ Korrekturen gespeichert.');
    btn.style.display = 'none';
  } catch(e) {
    console.error('[saveCorrections]', e);
    setStatus('Fehler: ' + e.message);
    btn.disabled = false;
  }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function runBookReview() {
  const bookId = document.getElementById('book-select').value;
  const bookName = document.getElementById('book-select').selectedOptions[0]?.textContent || 'Buch';
  const btn = document.getElementById('btn-book-review');
  const card = document.getElementById('book-review-card');
  const statusEl = document.getElementById('book-review-status');
  const outEl = document.getElementById('book-review-out');

  btn.disabled = true;
  card.style.display = '';
  document.getElementById('book-review-title').textContent = 'Buchbewertung: ' + bookName;
  outEl.innerHTML = '';

  const setReviewStatus = (msg, spinner) => {
    statusEl.innerHTML = spinner ? `<span class="spinner"></span>${msg}` : msg;
  };

  try {
    setReviewStatus('Lade Seiten…', true);
    const [chaptersData, pagesData] = await Promise.all([
      bsGet('chapters?book_id=' + bookId),
      bsGet('pages?book_id=' + bookId)
    ]);

    const chMap = {};
    chaptersData.data.forEach(c => chMap[c.id] = c.name);
    const pages = pagesData.data;

    if (pages.length === 0) {
      setReviewStatus('Keine Seiten im Buch gefunden.');
      btn.disabled = false;
      return;
    }

    // Progress bar
    outEl.innerHTML = `<div class="progress-bar-wrap"><div class="progress-bar" id="rev-progress" style="width:0%"></div></div>`;
    setReviewStatus(`Lese ${pages.length} Seiten…`, true);

    const pageContents = [];
    for (let i = 0; i < pages.length; i++) {
      const p = pages[i];
      document.getElementById('rev-progress').style.width = Math.round((i / pages.length) * 80) + '%';
      try {
        const pd = await bsGet('pages/' + p.id);
        const text = htmlToText(pd.html).trim();
        if (text.length > 50) {
          const chapter = p.chapter_id ? (chMap[p.chapter_id] || 'Kapitel') : null;
          pageContents.push({
            title: p.name,
            chapter,
            text: text.length > 3000 ? text.slice(0, 3000) + ' […]' : text
          });
        }
      } catch(e) { console.error('[runBookReview page]', p.id, e); }
    }

    document.getElementById('rev-progress').style.width = '85%';
    setReviewStatus('Claude analysiert das Buch…', true);

    const bookText = pageContents.map(p =>
      `### ${p.chapter ? '[' + p.chapter + '] ' : ''}${p.title}\n${p.text}`
    ).join('\n\n---\n\n');

    const prompt = `Du bist ein erfahrener Literaturkritiker und Lektor für deutschsprachige Texte aus der Schweiz. Helvetismen (grösseres, Strasse, gemäss, usw.) sind korrekt und werden nicht bemängelt.

Bewerte das folgende Buch «${bookName}» kritisch und umfassend. Analysiere dabei:
- Struktur und Aufbau (Kapitel, Übergänge, Logik)
- Sprachstil und Konsistenz über alle Seiten hinweg
- Stärken des Texts
- Schwächen und Verbesserungspotenzial
- Konkrete Empfehlungen für den Autor

Antworte NUR mit einem JSON-Objekt, kein Markdown, keine Erklärungen davor oder danach:
{
  "gesamtnote": "Zahl von 1 (sehr schwach) bis 5 (ausgezeichnet)",
  "gesamtnote_begruendung": "Ein Satz warum diese Note",
  "zusammenfassung": "2-3 Sätze Gesamteindruck",
  "struktur": "Analyse des Aufbaus und der Struktur (3-4 Sätze)",
  "stil": "Analyse des Schreibstils und seiner Konsistenz (3-4 Sätze)",
  "staerken": ["Stärke 1", "Stärke 2", "Stärke 3"],
  "schwaechen": ["Schwäche 1", "Schwäche 2"],
  "empfehlungen": ["Empfehlung 1", "Empfehlung 2", "Empfehlung 3"],
  "fazit": "Abschliessendes Urteil in 1-2 Sätzen"
}

Buchinhalt (${pageContents.length} Seiten):

${bookText}`;

    const resp = await fetch(CLAUDE_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: CLAUDE_MODEL,
        max_tokens: 8000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await resp.json();
    if (data.type === 'error') {
      throw new Error('Claude API Fehler: ' + (data.error?.message || JSON.stringify(data.error)));
    }
    const raw = (data.content || []).map(b => b.text || '').join('');
    const clean = raw.replace(/```json\s*|```/g, '').trim();

    let r;
    try { r = JSON.parse(clean); }
    catch(e) { throw new Error('Claude-Antwort konnte nicht geparst werden: ' + e.message + '\n\nRohantwort: ' + raw.slice(0, 300)); }

    document.getElementById('rev-progress').style.width = '100%';
    setTimeout(() => { if(outEl.querySelector('#rev-progress')) outEl.querySelector('.progress-bar-wrap').remove(); }, 400);

    const note = parseInt(r.gesamtnote, 10) || 0;
    const stars = '★'.repeat(Math.min(5, Math.max(0, note))) + '☆'.repeat(Math.max(0, 5 - note));

    let html = `
      <div class="bewertung-header">
        <span class="bewertung-stars">${stars}</span>
        <span class="bewertung-header-note">${escHtml(r.gesamtnote_begruendung || '')}</span>
      </div>
      <div class="stilbox" style="margin-bottom:14px;">${escHtml(r.zusammenfassung || '')}</div>`;

    if (r.struktur) html += `
      <div class="bewertung-section">
        <div class="bewertung-section-title">Struktur &amp; Aufbau</div>
        <p class="bewertung-section-text">${escHtml(r.struktur)}</p>
      </div>`;

    if (r.stil) html += `
      <div class="bewertung-section">
        <div class="bewertung-section-title">Schreibstil</div>
        <p class="bewertung-section-text">${escHtml(r.stil)}</p>
      </div>`;

    if (r.staerken?.length) html += `
      <div class="bewertung-section">
        <div class="bewertung-section-title">Stärken</div>
        <ul class="bullet-list pos">${r.staerken.map(s => `<li>${escHtml(s)}</li>`).join('')}</ul>
      </div>`;

    if (r.schwaechen?.length) html += `
      <div class="bewertung-section">
        <div class="bewertung-section-title">Schwächen</div>
        <ul class="bullet-list neg">${r.schwaechen.map(s => `<li>${escHtml(s)}</li>`).join('')}</ul>
      </div>`;

    if (r.empfehlungen?.length) html += `
      <div class="bewertung-section">
        <div class="bewertung-section-title">Empfehlungen</div>
        <ul class="bullet-list">${r.empfehlungen.map(s => `<li>${escHtml(s)}</li>`).join('')}</ul>
      </div>`;

    if (r.fazit) html += `<div class="fazit" style="margin-top:16px;">${escHtml(r.fazit)}</div>`;

    outEl.innerHTML = html;
    setReviewStatus(`${pageContents.length} Seiten analysiert.`);
  } catch(e) {
    console.error('[runBookReview]', e);
    outEl.innerHTML = `<span class="error-msg">Fehler: ${e.message}</span>`;
    setReviewStatus('');
  }

  btn.disabled = false;
}

async function init() {
  try {
    const cfg = await fetch('/config').then(r => r.json());
    if (cfg.tokenId && cfg.tokenPw) {
      authToken = 'Token ' + cfg.tokenId + ':' + cfg.tokenPw;
      loadBooks();
    } else {
      setStatus('Keine Zugangsdaten in .env konfiguriert.');
    }
  } catch(_) {
    setStatus('Fehler beim Laden der Konfiguration.');
  }
}

init();
</script>
</body>
</html>
