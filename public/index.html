<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lektorat">
  <meta name="theme-color" content="#f7f7f5" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
  <title>BookStack Lektorat</title>
  <link rel="icon" href="bookstack_lektorat_icon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <script>
    // Theme vor erstem Paint setzen (FOUC-Schutz). Gespeicherte Präferenz:
    // 'auto' (folgt System), 'light', 'dark'. Auflösung → data-theme-Attribut.
    (function () {
      var stored = null;
      try { stored = localStorage.getItem('theme'); } catch (e) {}
      var pref = (stored === 'light' || stored === 'dark' || stored === 'auto') ? stored : 'auto';
      var resolved = pref === 'auto'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : pref;
      document.documentElement.setAttribute('data-theme', resolved);
      window.__themePref = pref;
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="js/app.js"></script>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body x-data="lektorat"
      @keydown.ctrl.enter.window="if (showEditorCard && !checkLoading && !focusMode) runCheck()"
      @keydown.ctrl.s.prevent.window="if (editMode) quickSave()"
      @keydown.meta.s.prevent.window="if (editMode) quickSave()"
      @keydown.window="handleShortcutsHotkey($event); handleFocusHotkey($event)">

<div class="session-banner" x-show="sessionExpired" x-cloak>
  <span class="session-banner-text" x-text="t('session.expired')"></span>
  <a class="session-banner-btn" :href="'/auth/login?returnTo=' + encodeURIComponent(location.pathname + location.search)" x-text="t('session.relogin')"></a>
</div>

<div class="session-banner" x-show="bookstackTokenInvalid && !sessionExpired" x-cloak>
  <span class="session-banner-text" x-text="t('session.bookstackTokenInvalid')"></span>
  <button type="button" class="session-banner-btn" @click="openTokenChange()" x-text="t('profile.changeToken')"></button>
</div>

<div class="session-banner" x-show="serverOffline && !sessionExpired" x-cloak>
  <span class="session-banner-text" x-text="t('session.serverOffline')"></span>
  <button type="button" class="session-banner-btn" @click="location.reload()" x-text="t('session.retry')"></button>
</div>

<div class="session-banner session-banner--offline" x-show="isOffline && !sessionExpired && !serverOffline" x-cloak>
  <span class="session-banner-text" x-text="t('session.offlineMode')"></span>
</div>

<h1 @click="resetView()" class="site-title" :title="t('app.titleReset')">
  <img src="bookstack_lektorat_icon.svg" alt="" class="site-logo" width="64" height="64">
  BookStack Lektorat
</h1>
<div class="dev-banner" x-show="devMode" x-cloak x-text="t('dev.banner')"></div>
<div class="site-header-row">
  <p class="subtitle"><span x-text="t('app.subtitle')"></span></p>
  <div class="header-actions" x-show="currentUser">
    <div class="header-action-cluster">
      <div id="partial-komplett-status"></div>
    </div>
    <div id="partial-avatar-menu"></div>
  </div>
</div>

<div id="partial-token-setup"></div>

<!-- Bücherliste & Seitenauswahl -->
<div class="card card--book-selector" x-show="showBookCard" x-cloak>
  <label x-text="t('book.label')"></label>
  <div class="row book-selector-row">
    <div x-data="combobox(t('book.chooseBook'))"
         x-modelable="value" x-model="selectedBookId"
         x-effect="options = books.map(b => ({value: String(b.id), label: b.name}))"
         @combobox-change="resetView();"
         @click.outside="close()"
         @keydown="onKeydown($event)"
         class="combobox-wrap">
    </div>
    <a :href="selectedBookUrl || '#'" target="_blank" rel="noopener" class="btn-bookstack-link" :class="{ 'btn-bookstack-link--hidden': !selectedBookUrl }" :tabindex="selectedBookUrl ? 0 : -1" :aria-hidden="!selectedBookUrl" :title="t('book.openInBookstack')" x-text="t('book.bookstack')"></a>
  </div>

  <!-- BookStack-Volltextsuche (im aktuellen Buch) -->
  <div class="bookstack-search" x-show="selectedBookId" x-cloak>
    <div class="bookstack-search-input-wrap">
      <input type="text"
             class="bookstack-search-input"
             x-model="bookstackSearch"
             @input="onBookstackSearchInput()"
             @keydown.escape="clearBookstackSearch()"
             :placeholder="t('book.search.placeholder')">
      <button type="button" class="bookstack-search-clear"
              x-show="bookstackSearch"
              @mousedown.prevent="clearBookstackSearch()"
              :title="t('book.search.clear')"
              :aria-label="t('book.search.clear')">×</button>
    </div>
    <div class="bookstack-search-results" x-show="bookstackSearch.trim().length >= 2">
      <div class="bookstack-search-status" x-show="bookstackSearchLoading" x-text="t('book.search.loading')"></div>
      <div class="bookstack-search-status bookstack-search-status--error" x-show="!bookstackSearchLoading && bookstackSearchError" x-text="bookstackSearchError"></div>
      <div class="bookstack-search-empty" x-show="!bookstackSearchLoading && !bookstackSearchError && bookstackSearched && bookstackSearchResults.length === 0" x-text="t('book.search.noResults')"></div>
      <template x-for="hit in bookstackSearchResults" :key="hit.id">
        <div class="bookstack-search-item" :class="{ 'is-current': currentPage && currentPage.id === hit.id }" x-show="!bookstackSearchLoading" @click="selectPageFromBookstackSearch(hit)">
          <div class="bookstack-search-item-title" x-html="escPreserveStrong(hit.preview_html?.name || hit.name)"></div>
          <div class="bookstack-search-item-snippet" x-html="escPreserveStrong(hit.preview_html?.content || '')" x-show="hit.preview_html?.content"></div>
        </div>
      </template>
    </div>
  </div>

  <!-- Feature-Tiles: Buchanalyse -->
  <div class="feature-tiles">
    <button type="button" class="feature-tile" :class="{ 'feature-tile--active': showBookReviewCard }" @click="toggleBookReviewCard()">
      <span class="feature-tile-title" x-text="t('tile.review')"></span>
      <span class="feature-tile-desc" x-text="t('tile.review.desc')"></span>
    </button>
    <button type="button" class="feature-tile" :class="{ 'feature-tile--active': showFiguresCard }" @click="toggleFiguresCard()" :title="t('tile.figuren.title')">
      <span class="feature-tile-title" x-text="t('tile.figuren')"></span>
      <span class="feature-tile-desc" x-text="t('tile.figuren.desc')"></span>
    </button>
    <button type="button" class="feature-tile" :class="{ 'feature-tile--active': showSzenenCard }" @click="toggleSzenenCard()" :title="t('tile.szenen.title')">
      <span class="feature-tile-title" x-text="t('tile.szenen')"></span>
      <span class="feature-tile-desc" x-text="t('tile.szenen.desc')"></span>
    </button>
    <button type="button" class="feature-tile" :class="{ 'feature-tile--active': showBookStatsCard }" @click="toggleBookStatsCard()" :title="t('tile.stats.title')">
      <span class="feature-tile-title" x-text="t('tile.stats')"></span>
      <span class="feature-tile-desc" x-text="t('tile.stats.desc')"></span>
    </button>
    <button type="button" class="feature-tile" :class="{ 'feature-tile--active': showStilCard }" @click="toggleStilCard()" :title="t('tile.stil.title')">
      <span class="feature-tile-title" x-text="t('tile.stil')"></span>
      <span class="feature-tile-desc" x-text="t('tile.stil.desc')"></span>
    </button>
    <button type="button" class="feature-tile" :class="{ 'feature-tile--active': showFehlerHeatmapCard }" @click="toggleFehlerHeatmapCard()" :title="t('tile.fehlerHeatmap.title')">
      <span class="feature-tile-title" x-text="t('tile.fehlerHeatmap')"></span>
      <span class="feature-tile-desc" x-text="t('tile.fehlerHeatmap.desc')"></span>
    </button>
    <button type="button" class="feature-tile" :class="{ 'feature-tile--active': showBookChatCard }" @click="toggleBookChatCard()" :disabled="!pages.length" :title="t('tile.bookchat.title')">
      <span class="feature-tile-title" x-text="t('tile.bookchat')"></span>
      <span class="feature-tile-desc" x-text="t('tile.bookchat.desc')"></span>
    </button>
    <button type="button" class="feature-tile" :class="{ 'feature-tile--active': showEreignisseCard }" @click="toggleEreignisseCard()" :title="t('tile.events.title')">
      <span class="feature-tile-title" x-text="t('tile.events')"></span>
      <span class="feature-tile-desc" x-text="t('tile.events.desc')"></span>
    </button>
    <button type="button" class="feature-tile" :class="{ 'feature-tile--active': showOrteCard }" @click="toggleOrteCard()" :title="t('tile.orte.title')">
      <span class="feature-tile-title" x-text="t('tile.orte')"></span>
      <span class="feature-tile-desc" x-text="t('tile.orte.desc')"></span>
    </button>
    <button type="button" class="feature-tile" :class="{ 'feature-tile--active': showKontinuitaetCard }" @click="toggleKontinuitaetCard()" :title="t('tile.kontinuitaet.title')">
      <span class="feature-tile-title" x-text="t('tile.kontinuitaet')"></span>
      <span class="feature-tile-desc" x-text="t('tile.kontinuitaet.desc')"></span>
    </button>
    <button type="button" class="feature-tile" :class="{ 'feature-tile--active': showBookSettingsCard }" @click="toggleBookSettingsCard()" :title="t('tile.bookSettings.title')">
      <span class="feature-tile-title" x-text="t('tile.bookSettings')"></span>
      <span class="feature-tile-desc" x-text="t('tile.bookSettings.desc')"></span>
    </button>
  </div>

</div>

<div class="layout">
<div class="layout-sidebar">
  <div id="partial-sidebar"></div>
</div><!-- end layout-sidebar -->
<div class="layout-main">
<div id="partial-buchreview"></div>
<div id="partial-kapitelreview"></div>
<div id="partial-figuren"></div>
<div id="partial-szenen"></div>
<div id="partial-ereignisse"></div>
<div id="partial-orte"></div>
<div id="partial-kontinuitaet"></div>
<div id="partial-bookstats"></div>
<div id="partial-stil-heatmap"></div>
<div id="partial-fehler-heatmap"></div>
<div class="editor-chat-wrap" :class="{ 'editor-chat-split': showEditorCard && showChatCard }">
  <div id="partial-editor"></div>
  <div id="partial-chat"></div>
</div>
<div id="partial-book-settings"></div>
<div id="partial-user-settings"></div>
<!-- Edit-Toolbar (Bubble + Slash) – teleportiert nach <body>, hier nur Scope-Host -->
<div id="partial-editor-toolbar"></div>
<div id="partial-editor-find"></div>
<div id="partial-editor-figur-lookup"></div>
<div id="partial-editor-synonyme"></div>
<div id="partial-editor-focus"></div>
<div id="partial-shortcuts"></div>

</div><!-- end layout-main -->
</div><!-- end layout -->

<!-- Job-Queue Footer -->
<div class="job-queue-bar" x-show="jobQueueItems.length > 0" x-cloak>
  <span class="job-queue-label" x-text="t('jobQueue.label')"></span>
  <template x-for="job in jobQueueItems" :key="job.id">
    <div class="job-queue-pill" :class="'job-queue-pill--' + job.status" @click="navigateToJob(job)" :title="t('jobQueue.jumpTo')">
      <span class="job-queue-pill-label" x-text="t(job.label, job.labelParams)"></span>
      <span class="job-queue-pill-status" x-text="t(job.statusText, job.statusParams)"></span>
      <template x-if="job.status === 'running' && job.progress > 0">
        <span class="job-queue-pill-progress" x-text="job.progress + '%'"></span>
      </template>
      <button type="button" class="job-queue-cancel-btn" @click.stop="cancelJob(job.id)" :title="t('jobQueue.cancel')">&#x2715;</button>
    </div>
  </template>
</div>

</body>
</html>
