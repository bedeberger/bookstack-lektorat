<!-- Szenenanalyse -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/szenen-card.js.
  Fachdaten (szenen, figuren, orte) leben in Alpine.store('catalog');
  szenenFilters bleibt im Root.
-->
<div class="card" x-data="szenenCard" x-show="$app.showSzenenCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('szenen.title', { name: $app.selectedBookName })"></span>
    <span x-show="$app.alleAktualisierenLastRun && !szenenLoading" class="card-timestamp" x-text="$app.t('common.asOf', { date: $app.alleAktualisierenLastRun })"></span>
  </div>

  <!-- Fortschritt -->
  <div x-show="szenenProgress > 0" class="progress-bar-wrap">
    <div class="progress-bar" :style="{ '--progress': szenenProgress + '%' }"></div>
  </div>
  <div x-show="szenenStatus" class="card-status" x-html="szenenStatus"></div>

  <!-- Leer-Hinweis -->
  <div x-show="!$app.szenen.length && !szenenLoading && !szenenStatus" class="card-status" x-text="$app.t('common.noDataYet')"></div>

  <!-- Szenen-Übersicht: klappbar -->
  <div x-show="$app.szenen.length > 0" class="szenen-uebersicht">
    <button type="button"
            class="szenen-uebersicht-toggle"
            @click="szenenUebersichtOpen = !szenenUebersichtOpen"
            :aria-expanded="szenenUebersichtOpen">
      <span class="history-chevron" :class="{ open: szenenUebersichtOpen }">›</span>
      <span x-text="$app.t('szenen.distribution')"></span>
    </button>
    <div x-show="szenenUebersichtOpen" class="szenen-uebersicht-grid" x-cloak>
      <!-- Pro Figur -->
      <div class="szenen-uebersicht-block">
        <div class="bewertung-section-title" x-text="$app.t('szenen.byFigur')"></div>
        <div class="szenen-count-badges">
          <template x-for="f in $app.figuren" :key="f.id">
            <span x-show="$app.szenen.some(s => s.fig_ids.includes(f.id))"
              class="szenen-figur-count-badge"
              :class="$app.szenen.filter(s => s.fig_ids.includes(f.id)).length < 3 ? 'szenen-figur-count-badge--wenig' : ''"
              x-text="(f.kurzname || f.name) + ' · ' + $app.szenen.filter(s => s.fig_ids.includes(f.id)).length">
            </span>
          </template>
        </div>
      </div>
      <!-- Pro Kapitel -->
      <div class="szenen-uebersicht-block">
        <div class="bewertung-section-title" x-text="$app.t('szenen.byKapitel')"></div>
        <div class="szenen-count-badges">
          <template x-for="k in $app.szenenNachKapitel" :key="k.name">
            <span class="szenen-kapitel-count-badge" :title="$app.t('szenen.tooltip', { stark: k.stark, mittel: k.mittel, schwach: k.schwach })">
              <span class="szenen-kapitel-name" x-text="k.name"></span>
              <span class="szenen-kapitel-dots">
                <template x-for="n in k.stark"   :key="'s'+n"><span class="szenen-dot szenen-dot--stark"></span></template>
                <template x-for="n in k.mittel"  :key="'m'+n"><span class="szenen-dot szenen-dot--mittel"></span></template>
                <template x-for="n in k.schwach" :key="'w'+n"><span class="szenen-dot szenen-dot--schwach"></span></template>
              </span>
              <span class="szenen-kapitel-total" x-text="k.total"></span>
            </span>
          </template>
        </div>
      </div>
      <!-- Pro Seite -->
      <div class="szenen-uebersicht-block" x-show="$app.szenenNachSeite.length > 0">
        <div class="bewertung-section-title" x-text="$app.t('szenen.bySeite')"></div>
        <div class="szenen-count-badges">
          <template x-for="p in $app.szenenNachSeite" :key="p.name">
            <span class="szenen-seite-count-badge" :title="p.kapitel" x-text="p.name + ' · ' + p.total"></span>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- Alle Szenen -->
  <div x-show="$app.szenen.length > 0" class="szenen-liste-section">
    <!-- Filter-Leiste -->
    <div class="filter-bar">
      <input type="text" x-model="$app.szenenFilters.suche" :placeholder="$app.t('common.search')" :aria-label="$app.t('common.search')" class="filter-search-input">
      <div class="szenen-filter-group">
        <button type="button" class="szenen-filter-btn" :class="{ 'szenen-filter-btn--active': $app.szenenFilters.wertung === '' }" @click="$app.szenenFilters.wertung = ''" x-text="$app.t('common.all')"></button>
        <button type="button" class="szenen-filter-btn szenen-filter-btn--stark"   :class="{ 'szenen-filter-btn--active': $app.szenenFilters.wertung === 'stark' }"   @click="$app.szenenFilters.wertung = $app.szenenFilters.wertung === 'stark'   ? '' : 'stark'" x-text="$app.t('szenen.rating.stark')"></button>
        <button type="button" class="szenen-filter-btn szenen-filter-btn--mittel"  :class="{ 'szenen-filter-btn--active': $app.szenenFilters.wertung === 'mittel' }"  @click="$app.szenenFilters.wertung = $app.szenenFilters.wertung === 'mittel'  ? '' : 'mittel'" x-text="$app.t('szenen.rating.mittel')"></button>
        <button type="button" class="szenen-filter-btn szenen-filter-btn--schwach" :class="{ 'szenen-filter-btn--active': $app.szenenFilters.wertung === 'schwach' }" @click="$app.szenenFilters.wertung = $app.szenenFilters.wertung === 'schwach' ? '' : 'schwach'" x-text="$app.t('szenen.rating.schwach')"></button>
      </div>
      <div x-data="combobox($app.t('filter.figur'), $app.t('filter.allFiguren'))"
           x-modelable="value" x-model="$app.szenenFilters.figurId"
           x-effect="options = $app.figuren.filter(f => $app.szenen.some(s => s.fig_ids.includes(f.id))).map(f => ({value: f.id, label: f.kurzname || f.name}))"
           @click.outside="close()" @keydown="onKeydown($event)"
           class="combobox-wrap combobox-wrap--compact">
      </div>
      <div x-data="combobox($app.t('filter.chapter'), $app.t('filter.allChapters'))"
           x-modelable="value" x-model="$app.szenenFilters.kapitel"
           x-effect="options = $app.szenenKapitelListe().map(k => ({value: k, label: k}))"
           @click.outside="close()" @keydown="onKeydown($event)"
           class="combobox-wrap combobox-wrap--compact">
      </div>
      <div x-show="$app.orte.length > 0"
           x-data="combobox($app.t('filter.ort'), $app.t('filter.allOrte'))"
           x-modelable="value" x-model="$app.szenenFilters.ortId"
           x-effect="options = $app.orte.filter(o => $app.szenen.some(s => (s.ort_ids||[]).includes(o.id))).map(o => ({value: o.id, label: o.name}))"
           @click.outside="close()" @keydown="onKeydown($event)"
           class="combobox-wrap combobox-wrap--compact">
      </div>
      <span class="filter-count" x-text="$app.szenenFiltered.length + ' / ' + $app.szenen.length"></span>
    </div>

    <!-- Kompakte Szenen-Liste -->
    <div class="szene-list">
      <template x-for="(s, i) in $app.szenenFiltered" :key="s.id || i">
        <div>
          <div class="szene-row"
               :data-szeneid="s.id"
               :class="{ 'szene-row--selected': $app.selectedSzeneId === s.id }"
               @click="$app.selectedSzeneId = $app.selectedSzeneId === s.id ? null : s.id">
            <span class="szenen-dot szene-row-dot"
                  :class="'szenen-dot--' + (s.wertung || 'mittel')"
                  :title="s.wertung ? $app.t('szenen.rating.' + s.wertung) : ''"></span>
            <span class="szene-row-titel" x-text="s.titel"></span>
            <span class="szene-row-stelle internal-link"
                  @click.stop="s.page_id ? $app.gotoPageById(s.page_id) : $app.gotoStelle(s.kapitel, s.seite)"
                  x-text="s.kapitel + (s.seite ? ' · ' + s.seite : '')"></span>
            <span class="history-chevron" :class="{ open: $app.selectedSzeneId === s.id }">›</span>
          </div>
          <div x-show="$app.selectedSzeneId === s.id" class="szene-detail" x-cloak>
            <p x-show="s.kommentar" x-text="s.kommentar" class="szene-detail-kommentar"></p>
            <div x-show="(s.fig_ids || []).length > 0" class="szene-meta-row">
              <span class="szene-meta-label" x-text="$app.t('orte.figuren')"></span>
              <template x-for="figId in (s.fig_ids || [])" :key="figId">
                <span class="tag internal-link"
                      @click.stop="$app.openFigurById(figId)"
                      x-text="$app.figurenById.get(figId)?.kurzname || $app.figurenById.get(figId)?.name || figId"></span>
              </template>
            </div>
            <div x-show="(s.ort_ids || []).length > 0" class="szene-meta-row">
              <span class="szene-meta-label" x-text="$app.t('szenen.orte')"></span>
              <template x-for="ortId in (s.ort_ids || [])" :key="'o'+ortId">
                <span class="tag internal-link"
                      @click.stop="$app.openOrtById(ortId)"
                      x-text="$app.orteById.get(ortId)?.name || ortId"></span>
              </template>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>
