<!-- Figurenentwicklungsbögen -->
<div class="card" x-show="showCharacterArcsCard" x-cloak x-transition>
  <div class="card-header">
    <span class="card-title" x-text="'Entwicklungsbögen: ' + selectedBookName"></span>
    <span x-show="alleAktualisierenLastRun && !characterArcsLoading" class="figuren-updated-at" x-text="'Superjob: ' + alleAktualisierenLastRun"></span>
    <div class="card-actions">
      <button :disabled="true" title="Wird durch «Alle aktualisieren» ausgelöst">
        <span x-text="characterArcs ? 'Neu analysieren' : 'Analysieren'"></span>
      </button>
    </div>
  </div>

  <div x-show="characterArcsProgress > 0" class="progress-bar-wrap">
    <div class="progress-bar" :style="'width:' + characterArcsProgress + '%'"></div>
  </div>
  <div x-show="characterArcsStatus" class="figur-progress-status" x-html="characterArcsStatus"></div>

  <div x-show="!characterArcs && !characterArcsLoading && !characterArcsStatus" class="figur-progress-status">
    Noch keine Analyse durchgeführt. Klicke auf «Analysieren» um Entwicklungsbögen aller Figuren zu ermitteln.
    <template x-if="!figuren.length">
      <span> Bitte zuerst Figuren laden.</span>
    </template>
  </div>

  <!-- Filter-Leiste -->
  <template x-if="characterArcs && characterArcs.length > 0">
    <div class="carc-filter-bar">
      <div x-data="combobox('Figur…', 'Alle Figuren')"
           x-modelable="value" x-model="arcFilterFigurId"
           x-effect="options = figuren.filter(f => characterArcs.some(a => a.fig_id === f.id)).map(f => ({value: f.id, label: f.kurzname || f.name}))"
           @click.outside="close()" @keydown="onKeydown($event)"
           class="combobox-wrap combobox-wrap--compact">
      </div>
      <div x-data="combobox('Kapitel…', 'Alle Kapitel')"
           x-modelable="value" x-model="arcFilterKapitel"
           x-effect="options = arcKapitelListe().map(k => ({value: k, label: k}))"
           @combobox-change="arcFilterSeite = ''"
           @click.outside="close()" @keydown="onKeydown($event)"
           class="combobox-wrap combobox-wrap--compact">
      </div>
      <template x-if="arcFilterKapitel && arcSeitenListe().length > 0">
        <div x-data="combobox('Seite…', 'Alle Seiten')"
             x-modelable="value" x-model="arcFilterSeite"
             x-effect="options = arcSeitenListe().map(s => ({value: s, label: s}))"
             @click.outside="close()" @keydown="onKeydown($event)"
             class="combobox-wrap combobox-wrap--compact">
        </div>
      </template>
      <span class="szenen-filter-count" x-text="characterArcsFiltered.length + ' / ' + characterArcs.length"></span>
    </div>
  </template>

  <!-- Bögen-Matrix -->
  <template x-if="characterArcs && characterArcs.length > 0">
    <div class="carc-list">
      <template x-for="arc in characterArcsSorted()" :key="arc.fig_id">
        <div class="carc-card">

          <!-- Figur-Header -->
          <div class="carc-header">
            <span class="carc-figur-name" x-text="arcFigurData(arc.fig_id)?.name || arc.fig_id"></span>
            <span class="carc-arc-badge" :class="arcTypClass(arc.arc_typ)" x-text="arcTypLabel(arc.arc_typ)"></span>
          </div>

          <!-- Gesamtbogen-Satz -->
          <p class="carc-gesamtbogen" x-show="arc.gesamtbogen" x-text="arc.gesamtbogen"></p>

          <!-- Etappen-Leiste -->
          <template x-if="arc.etappen && arc.etappen.length > 0">
            <div>
              <div class="carc-stages-row">
                <template x-for="(stage, si) in arc.etappen" :key="si">
                  <div class="carc-stage-group">
                    <div class="carc-stage-chip"
                         :class="{ 'carc-stage-chip--active': $data._arcDetailKey === arc.fig_id + ':' + si }"
                         @click="$data._arcDetailKey = ($data._arcDetailKey === arc.fig_id + ':' + si) ? null : arc.fig_id + ':' + si"
                         x-text="stage.kapitel || ('Etappe ' + (si + 1))">
                    </div>
                    <template x-if="si < arc.etappen.length - 1">
                      <span class="carc-stage-arrow">&#x2192;</span>
                    </template>
                  </div>
                </template>
              </div>

              <!-- Etappen-Detail (aufklappbar) -->
              <template x-for="(stage, si) in arc.etappen" :key="'d' + si">
                <div class="carc-stage-detail"
                     x-show="$data._arcDetailKey === arc.fig_id + ':' + si"
                     x-transition>
                  <div class="carc-detail-kapitel" x-text="stage.kapitel"></div>
                  <template x-if="stage.wendepunkt">
                    <div class="carc-detail-row carc-detail-wendepunkt">
                      <span class="carc-detail-label">Wendepunkt</span>
                      <span x-text="stage.wendepunkt"></span>
                    </div>
                  </template>
                  <div class="carc-detail-row">
                    <span class="carc-detail-label">Soziale Position</span>
                    <span x-text="stage.soziale_position"></span>
                  </div>
                  <div class="carc-detail-row">
                    <span class="carc-detail-label">Innere Haltung</span>
                    <span x-text="stage.innere_haltung"></span>
                  </div>
                  <div class="carc-detail-row" x-show="stage.beziehungsstatus">
                    <span class="carc-detail-label">Beziehungen</span>
                    <span x-text="stage.beziehungsstatus"></span>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- Ausgangs- / Endzustand -->
          <div class="carc-zustaende" x-show="arc.ausgangszustand || arc.endzustand">
            <span class="carc-zustand-item" x-show="arc.ausgangszustand">
              <span class="carc-zustand-label">Anfang</span>
              <span x-text="arc.ausgangszustand"></span>
            </span>
            <span class="carc-zustand-sep" x-show="arc.ausgangszustand && arc.endzustand">&#x2192;</span>
            <span class="carc-zustand-item" x-show="arc.endzustand">
              <span class="carc-zustand-label">Ende</span>
              <span x-text="arc.endzustand"></span>
            </span>
          </div>

        </div>
      </template>
    </div>
  </template>

  <div x-show="characterArcs && characterArcs.length === 0" class="figur-progress-status">
    Keine Entwicklungsbögen gefunden.
  </div>
</div>
