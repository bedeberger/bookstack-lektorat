<!-- Fehler-Heatmap: Fehlertyp × Kapitel, aggregiert aus jüngstem page_check pro Seite -->
<div class="card" x-show="showFehlerHeatmapCard" x-cloak x-transition>
  <div class="card-header">
    <span class="card-title" x-text="t('fehlerHeatmap.title', { name: selectedBookName })"></span>
    <div class="card-actions">
      <div class="mode-toggle">
        <button type="button"
                :class="{ 'mode-toggle-btn--active': fehlerHeatmapMode === 'open' }"
                class="mode-toggle-btn"
                @click="setFehlerHeatmapMode('open')"
                x-text="t('fehlerHeatmap.mode.open')"></button>
        <button type="button"
                :class="{ 'mode-toggle-btn--active': fehlerHeatmapMode === 'applied' }"
                class="mode-toggle-btn"
                @click="setFehlerHeatmapMode('applied')"
                x-text="t('fehlerHeatmap.mode.applied')"></button>
        <button type="button"
                :class="{ 'mode-toggle-btn--active': fehlerHeatmapMode === 'all' }"
                class="mode-toggle-btn"
                @click="setFehlerHeatmapMode('all')"
                x-text="t('fehlerHeatmap.mode.all')"></button>
      </div>
    </div>
  </div>

  <div x-show="fehlerHeatmapStatus" class="card-status" x-html="fehlerHeatmapStatus"></div>

  <div x-show="!fehlerHeatmapLoading && (!fehlerHeatmapData?.chapters || fehlerHeatmapData.chapters.length === 0)"
       class="muted-msg muted-msg--spaced" x-text="t('fehlerHeatmap.emptyState')"></div>

  <template x-if="fehlerHeatmapData?.chapters?.length > 0">
    <div class="heatmap-wrap">
      <div class="heatmap-legend" x-text="t('fehlerHeatmap.legend')"></div>

      <div class="heatmap-scroll">
        <table class="heatmap-table">
          <thead>
            <tr>
              <th class="heatmap-rowhead" x-text="t('fehlerHeatmap.chapter')"></th>
              <th class="heatmap-numcol" x-text="t('fehlerHeatmap.coverage')"></th>
              <template x-for="typ in fehlerHeatmapTypen" :key="typ">
                <th :title="t('fehlerHeatmap.typ.' + typ)">
                  <span x-text="t('fehlerHeatmap.typ.' + typ)"></span>
                </th>
              </template>
            </tr>
          </thead>
          <tbody>
            <template x-for="ch in fehlerHeatmapData.chapters" :key="fehlerHeatmapChapterKey(ch)">
              <tr>
                <th class="heatmap-rowhead" scope="row">
                  <span class="heatmap-rowhead-main" x-text="fehlerHeatmapChapterName(ch)"></span>
                  <span class="heatmap-rowhead-sub" x-text="t('fehlerHeatmap.words', { n: (ch.words || 0).toLocaleString(uiLocale === 'en' ? 'en-US' : 'de-CH') })"></span>
                </th>
                <td class="heatmap-numcol">
                  <span x-text="t('fehlerHeatmap.coverageLabel', { checked: ch.pages_checked, total: ch.pages_total })"></span>
                  <span class="heatmap-coverage">
                    <span class="heatmap-coverage-bar" :style="'width: ' + fehlerHeatmapCoveragePct(ch) + '%'"></span>
                  </span>
                </td>
                <template x-for="typ in fehlerHeatmapTypen" :key="typ">
                  <td class="heatmap-cell heatmap-cell--clickable"
                      :class="{ 'heatmap-cell--active': activeFehlerDetailKey === fehlerHeatmapChapterKey(ch) + ':' + typ }"
                      :style="fehlerHeatmapCellStyle(fehlerHeatmapChapterKey(ch), typ, fehlerHeatmapCoveragePct(ch))"
                      :title="fehlerHeatmapCellTooltip(fehlerHeatmapChapterKey(ch), typ)"
                      @click="toggleFehlerHeatmapDetail(fehlerHeatmapChapterKey(ch), typ)"
                      x-text="fehlerHeatmapCellLabel(fehlerHeatmapChapterKey(ch), typ)">
                  </td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Detail-Panel: aufklappbar bei Klick auf Zelle -->
      <template x-if="fehlerHeatmapActiveDetail()">
        <div class="heatmap-detail">
          <div class="heatmap-detail-header">
            <span class="heatmap-detail-title"
                  x-text="t('fehlerHeatmap.detail.title', {
                    typ: t('fehlerHeatmap.typ.' + fehlerHeatmapActiveDetail().typ),
                    chapter: fehlerHeatmapActiveDetail().chapterName,
                  })"></span>
            <button type="button" class="heatmap-detail-close"
                    @click="activeFehlerDetailKey = null"
                    x-text="t('common.close')"></button>
          </div>
          <div class="heatmap-detail-list">
            <template x-for="page in fehlerHeatmapActiveDetail().pages" :key="page.page_id">
              <div class="heatmap-detail-page">
                <div class="heatmap-detail-page-header">
                  <span class="tag internal-link"
                        @click="fehlerHeatmapJumpToPage(page.page_id)"
                        x-text="page.page_name"></span>
                  <span class="heatmap-detail-page-count" x-text="t('fehlerHeatmap.detail.countLabel', { n: page.count })"></span>
                </div>
                <template x-for="(s, i) in page.samples" :key="i">
                  <div class="heatmap-detail-sample">
                    <span class="heatmap-detail-original" x-text="s.original"></span>
                    <template x-if="s.korrektur">
                      <span class="heatmap-detail-arrow">→</span>
                    </template>
                    <template x-if="s.korrektur">
                      <span class="heatmap-detail-korrektur" x-text="s.korrektur"></span>
                    </template>
                    <template x-if="s.erklaerung">
                      <div class="heatmap-detail-erklaerung" x-text="s.erklaerung"></div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </template>
</div>
