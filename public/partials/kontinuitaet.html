<!-- Kontinuitätsprüfung -->
<div class="card" x-show="showKontinuitaetCard" x-cloak x-transition>
  <div class="card-header">
    <span class="card-title" x-text="'Kontinuität: ' + selectedBookName"></span>
    <span x-show="alleAktualisierenLastRun && !kontinuitaetLoading" class="figuren-updated-at" x-text="'Stand: ' + alleAktualisierenLastRun"></span>
  </div>

  <div x-show="kontinuitaetProgress > 0" class="progress-bar-wrap">
    <div class="progress-bar" :style="'width:' + kontinuitaetProgress + '%'"></div>
  </div>
  <div x-show="kontinuitaetStatus" class="card-status" x-html="kontinuitaetStatus"></div>

  <div x-show="!kontinuitaetResult && !kontinuitaetLoading && !kontinuitaetStatus" class="card-status">
    Noch keine Daten vorhanden. Bitte auf «Alle aktualisieren» klicken.
  </div>

  <!-- Filter-Leiste (ausserhalb x-if, damit Alpine x-effect die Parent-Reaktivität korrekt trackt) -->
  <div x-show="kontinuitaetResult?.issues?.length > 0" class="filter-bar">
    <div x-data="combobox('Figur…', 'Alle Figuren')"
         x-modelable="value" x-model="kontinuitaetFilterFigurId"
         x-effect="options = figuren.filter(f => (kontinuitaetResult?.issues||[]).some(i => i.fig_ids?.length ? i.fig_ids.includes(f.id) : (i.figuren||[]).includes(f.name))).map(f => ({value: f.id, label: f.kurzname || f.name}))"
         @click.outside="close()" @keydown="onKeydown($event)"
         class="combobox-wrap combobox-wrap--compact">
    </div>
    <div x-data="combobox('Kapitel…', 'Alle Kapitel')"
         x-modelable="value" x-model="kontinuitaetFilterKapitel"
         x-effect="options = kontinuitaetKapitelListe().map(k => ({value: k, label: k}))"
         @click.outside="close()" @keydown="onKeydown($event)"
         class="combobox-wrap combobox-wrap--compact">
    </div>
    <span class="filter-count" x-text="kontinuitaetResult ? kontinuitaetIssuesFiltered.length + ' / ' + kontinuitaetResult.issues.length : ''"></span>
  </div>

  <!-- Ergebnisse -->
  <template x-if="kontinuitaetResult">
    <div class="kontinuitaet-result">

      <!-- Zusammenfassung -->
      <div class="kontinuitaet-summary" x-text="kontinuitaetResult.summary"></div>

      <!-- Keine Probleme -->
      <div x-show="kontinuitaetResult.issues?.length === 0" class="kontinuitaet-ok">
        Keine Kontinuitätsprobleme gefunden.
      </div>
      <!-- Alle weggefiltert -->
      <div x-show="kontinuitaetResult.issues?.length > 0 && kontinuitaetIssuesFiltered.length === 0" class="kontinuitaet-ok">
        Keine Probleme für den gewählten Filter.
      </div>

      <!-- Probleme nach Schwere -->
      <template x-for="[severity, issues] in Object.entries(kontinuitaetIssuesBySwere()).filter(([,v]) => v.length > 0)" :key="severity">
        <div>
          <div class="kontinuitaet-group-header" :class="'kontinuitaet-group-header--' + severity">
            <span x-text="severity.charAt(0).toUpperCase() + severity.slice(1)"></span> (<span x-text="issues.length"></span>)
          </div>
          <template x-for="(issue, i) in issues" :key="severity + i">
            <div class="kontinuitaet-issue" :class="'kontinuitaet-issue--' + severity">
              <div class="kontinuitaet-issue-header">
                <span class="tag kontinuitaet-typ-tag" x-text="issue.typ"></span>
                <span class="kontinuitaet-stellen">
                  <template x-if="kontinuitaetResolveStelle(issue.stelle_a)">
                    <span class="internal-link" :title="'Zur Stelle springen: ' + kontinuitaetResolveStelle(issue.stelle_a).name"
                          @click="kontinuitaetGotoStelle(issue.stelle_a)" x-text="issue.stelle_a"></span>
                  </template>
                  <template x-if="!kontinuitaetResolveStelle(issue.stelle_a)">
                    <span x-text="issue.stelle_a"></span>
                  </template>
                  <span class="kontinuitaet-arrow">↔</span>
                  <template x-if="kontinuitaetResolveStelle(issue.stelle_b)">
                    <span class="internal-link" :title="'Zur Stelle springen: ' + kontinuitaetResolveStelle(issue.stelle_b).name"
                          @click="kontinuitaetGotoStelle(issue.stelle_b)" x-text="issue.stelle_b"></span>
                  </template>
                  <template x-if="!kontinuitaetResolveStelle(issue.stelle_b)">
                    <span x-text="issue.stelle_b"></span>
                  </template>
                </span>
              </div>
              <p class="kontinuitaet-desc" x-text="issue.beschreibung"></p>
              <p x-show="issue.empfehlung" class="kontinuitaet-empfehlung" x-text="'→ ' + issue.empfehlung"></p>
            </div>
          </template>
        </div>
      </template>

    </div>
  </template>
</div>
