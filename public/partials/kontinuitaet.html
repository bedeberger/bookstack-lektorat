<!-- Kontinuitätsprüfung -->
<div class="card" x-show="showKontinuitaetCard" x-cloak x-transition>
  <div class="card-header">
    <span class="card-title" x-text="'Kontinuität: ' + selectedBookName"></span>
    <span x-show="kontinuitaetResult && !kontinuitaetLoading" class="figuren-updated-at" x-text="'Letzte Prüfung: ' + formatDate(kontinuitaetResult?.checked_at)"></span>
    <div class="card-actions">
      <button @click="runKontinuitaetCheck()" :disabled="kontinuitaetLoading">
        <span x-show="kontinuitaetLoading" class="spinner"></span>
        <span x-text="kontinuitaetResult ? 'Neu prüfen' : 'Prüfen'"></span>
      </button>
    </div>
  </div>

  <div x-show="kontinuitaetProgress > 0" class="progress-bar-wrap">
    <div class="progress-bar" :style="'width:' + kontinuitaetProgress + '%'"></div>
  </div>
  <div x-show="kontinuitaetStatus" class="figur-progress-status" x-html="kontinuitaetStatus"></div>

  <div x-show="!kontinuitaetResult && !kontinuitaetLoading && !kontinuitaetStatus" class="figur-progress-status">
    Noch keine Prüfung durchgeführt. Klicke auf «Prüfen» um das Buch auf Widersprüche und Kontinuitätsfehler zu untersuchen.
  </div>

  <!-- Ergebnisse -->
  <template x-if="kontinuitaetResult">
    <div class="kontinuitaet-result">

      <!-- Zusammenfassung -->
      <div class="kontinuitaet-summary" x-text="kontinuitaetResult.summary"></div>

      <!-- Keine Probleme -->
      <div x-show="kontinuitaetResult.issues?.length === 0" class="kontinuitaet-ok">
        Keine Kontinuitätsprobleme gefunden.
      </div>

      <!-- Kritische Probleme -->
      <template x-if="kontinuitaetIssuesBySwere().kritisch.length > 0">
        <div>
          <div class="kontinuitaet-group-header kontinuitaet-group-header--kritisch">
            Kritisch (<span x-text="kontinuitaetIssuesBySwere().kritisch.length"></span>)
          </div>
          <template x-for="(issue, i) in kontinuitaetIssuesBySwere().kritisch" :key="'k' + i">
            <div class="kontinuitaet-issue kontinuitaet-issue--kritisch">
              <div class="kontinuitaet-issue-header">
                <span class="tag kontinuitaet-typ-tag" x-text="issue.typ"></span>
                <span class="kontinuitaet-stellen">
                  <span x-text="issue.stelle_a"></span>
                  <span class="kontinuitaet-arrow">↔</span>
                  <span x-text="issue.stelle_b"></span>
                </span>
              </div>
              <p class="kontinuitaet-desc" x-text="issue.beschreibung"></p>
              <p x-show="issue.empfehlung" class="kontinuitaet-empfehlung" x-text="'→ ' + issue.empfehlung"></p>
            </div>
          </template>
        </div>
      </template>

      <!-- Mittlere Probleme -->
      <template x-if="kontinuitaetIssuesBySwere().mittel.length > 0">
        <div>
          <div class="kontinuitaet-group-header kontinuitaet-group-header--mittel">
            Mittel (<span x-text="kontinuitaetIssuesBySwere().mittel.length"></span>)
          </div>
          <template x-for="(issue, i) in kontinuitaetIssuesBySwere().mittel" :key="'m' + i">
            <div class="kontinuitaet-issue kontinuitaet-issue--mittel">
              <div class="kontinuitaet-issue-header">
                <span class="tag kontinuitaet-typ-tag" x-text="issue.typ"></span>
                <span class="kontinuitaet-stellen">
                  <span x-text="issue.stelle_a"></span>
                  <span class="kontinuitaet-arrow">↔</span>
                  <span x-text="issue.stelle_b"></span>
                </span>
              </div>
              <p class="kontinuitaet-desc" x-text="issue.beschreibung"></p>
              <p x-show="issue.empfehlung" class="kontinuitaet-empfehlung" x-text="'→ ' + issue.empfehlung"></p>
            </div>
          </template>
        </div>
      </template>

      <!-- Niedrige Probleme -->
      <template x-if="kontinuitaetIssuesBySwere().niedrig.length > 0">
        <div>
          <div class="kontinuitaet-group-header kontinuitaet-group-header--niedrig">
            Niedrig (<span x-text="kontinuitaetIssuesBySwere().niedrig.length"></span>)
          </div>
          <template x-for="(issue, i) in kontinuitaetIssuesBySwere().niedrig" :key="'n' + i">
            <div class="kontinuitaet-issue kontinuitaet-issue--niedrig">
              <div class="kontinuitaet-issue-header">
                <span class="tag kontinuitaet-typ-tag" x-text="issue.typ"></span>
                <span class="kontinuitaet-stellen">
                  <span x-text="issue.stelle_a"></span>
                  <span class="kontinuitaet-arrow">↔</span>
                  <span x-text="issue.stelle_b"></span>
                </span>
              </div>
              <p class="kontinuitaet-desc" x-text="issue.beschreibung"></p>
              <p x-show="issue.empfehlung" class="kontinuitaet-empfehlung" x-text="'→ ' + issue.empfehlung"></p>
            </div>
          </template>
        </div>
      </template>

    </div>
  </template>
</div>
