<!-- Seiteneditor & Lektorat -->
<div class="card" id="editor-card" x-show="showEditorCard" x-cloak x-transition>
  <div class="card-header">
    <div>
      <span class="card-title" x-text="'Lektorat: ' + (currentPage?.name || '–')"></span>
      <a x-show="currentPage?.url" :href="currentPage?.url" target="_blank" rel="noopener" class="tag tag--link" x-text="currentPage ? 'ID ' + currentPage.id + ' ↗' : ''"></a>
      <span x-show="currentPage && tokEsts[currentPage.id]" class="tok-stats">
        <template x-if="tokEsts[currentPage?.id]?.words > 0">
          <span class="display-contents">
            <span class="tok-badge tok-neutral"
              x-text="tokEsts[currentPage.id]?.chars >= 1000 ? '~' + Math.round(tokEsts[currentPage.id].chars/1000) + 'k Z' : tokEsts[currentPage.id]?.chars + ' Z'"></span>
            <span class="tok-badge tok-neutral"
              x-text="tokEsts[currentPage.id]?.words >= 1000 ? '~' + Math.round(tokEsts[currentPage.id].words/1000) + 'k W' : tokEsts[currentPage.id]?.words + ' W'"></span>
            <span class="tok-badge"
              :class="tokEsts[currentPage.id]?.tok > 16000 ? 'tok-high' : tokEsts[currentPage.id]?.tok > 4000 ? 'tok-med' : 'tok-ok'"
              x-text="tokEsts[currentPage.id]?.tok >= 1000 ? '~' + Math.round(tokEsts[currentPage.id].tok/1000) + 'k T' : '~' + tokEsts[currentPage.id]?.tok + ' T'"
              ></span>
          </span>
        </template>
        <template x-if="tokEsts[currentPage?.id] && tokEsts[currentPage.id].words === 0">
          <span class="tok-badge tok-empty">leer</span>
        </template>
      </span>
    </div>
    <div class="card-actions">
      <button @click="runCheck()" :disabled="checkLoading || currentPageEmpty" :title="currentPageEmpty ? 'Seite ist leer' : 'Ctrl+Enter'">Prüfen</button>
      <button class="success" @click="saveCorrections()" :disabled="saveApplying != null" x-show="(correctedHtml && (selectedErrors.some(v => v) || selectedStyles.some(v => v))) || saveApplying != null">
        <span x-show="saveApplying != null" class="spinner"></span><span x-text="saveApplying != null ? 'Wird gespeichert…' : 'Korrekturen speichern'"></span>
      </button>
      <button @click="toggleChatCard()" :class="{ primary: showChatCard }" :disabled="currentPageEmpty" title="Chat mit dieser Seite">Chat</button>
    </div>
  </div>
  <div class="progress-bar-wrap" x-show="checkProgress > 0 || saveApplying != null">
    <div class="progress-bar" :style="'width:' + (checkProgress || saveApplying || 0) + '%'"></div>
  </div>
  <div id="status" x-html="statusHtml"></div>

  <!-- Figurenkontext-Panel (collapsible) -->
  <template x-if="chapterFigures.length > 0">
    <div class="figure-context-panel">
      <div class="figure-context-header" @click="showChapterFigures = !showChapterFigures">
        <span class="figure-context-title">
          <span class="figure-context-icon">F</span>
          <span x-text="chapterFigures.length + ' Figuren in diesem Kapitel'"></span>
        </span>
        <span class="history-chevron" :class="{ open: showChapterFigures }">›</span>
      </div>
      <div x-show="showChapterFigures" x-cloak class="figure-context-body">
        <template x-for="(fig, fi) in chapterFigures" :key="fi">
          <span class="figure-context-chip" x-data="{ show: false }" @mouseenter="show = true" @mouseleave="show = false">
            <span x-text="fig.kurzname || fig.name"></span>
            <span x-show="fig.typ" class="tag" x-text="fig.typ"></span>
            <div x-show="show" x-cloak class="figure-context-tooltip">
              <div class="figure-context-tooltip-name" x-text="fig.name"></div>
              <div x-show="fig.beruf" class="figure-context-tooltip-row"><span class="figure-context-label">Beruf:</span> <span x-text="fig.beruf"></span></div>
              <div x-show="fig.geschlecht" class="figure-context-tooltip-row"><span class="figure-context-label">Geschlecht:</span> <span x-text="fig.geschlecht"></span></div>
              <div x-show="fig.beschreibung" class="figure-context-tooltip-desc" x-text="fig.beschreibung"></div>
            </div>
          </span>
        </template>
      </div>
    </div>
  </template>

  <!-- Formatierte Seitenansicht -->
  <div x-show="renderedPageHtml && !checkDone" class="page-content-view" x-html="renderedPageHtml" @click="handleMarkClick($event)" @pointermove="handleMarkPointer($event)" @pointerleave="handleMarkPointerLeave($event)"></div>

  <!-- Analyse-Ausgabe -->
  <div class="editor-section">

    <!-- Formatierte Seitenansicht mit Inline-Highlights (nach Check) -->
    <div x-show="renderedPageHtml && checkDone" class="page-content-view page-content-view--compact" x-html="renderedPageHtml" @click="handleMarkClick($event)" @pointermove="handleMarkPointer($event)" @pointerleave="handleMarkPointerLeave($event)"></div>

    <!-- Fehlerfrei -->
    <div x-show="checkDone && lektoratErrors.length === 0" class="finding ok">
      <span class="badge badge-ok">✓ Fehlerfrei</span> &nbsp;Keine Rechtschreib- oder Grammatikfehler gefunden.
    </div>

    <!-- Fehler-Sektion -->
    <template x-if="lektoratErrors.length > 0">
      <div>
        <div class="section-heading finding-header">
          <span x-text="lektoratErrors.length + ' Fehler gefunden'"></span>
          <div class="finding-toggle-group">
            <button class="btn-sm" @click="selectAllErrors(true)">Alle</button>
            <button class="btn-sm" @click="selectAllErrors(false)">Keine</button>
          </div>
        </div>
        <template x-for="(f, i) in lektoratErrors" :key="i">
          <label class="finding error" :class="{ 'finding-deselected': !selectedErrors[i] }">
            <input type="checkbox" class="finding-checkbox" :checked="selectedErrors[i]" @change="toggleError(i)">
            <span class="badge" :class="({'rechtschreibung':1,'grammatik':1,'tempuswechsel':1}[f.typ]) ? 'badge-err' : 'badge-warn'" x-text="({'wiederholung':'Wdh.','schwaches_verb':'schw. Verb','fuellwort':'Füllwort','show_vs_tell':'Show/Tell','passiv':'Passiv','perspektivbruch':'Perspektive','tempuswechsel':'Tempus'})[f.typ] || f.typ"></span>
            <span class="finding-content">
              <del x-text="f.original"></del> → <ins x-text="f.korrektur"></ins>
              <div class="finding-context" x-text="'«' + f.kontext + '»'"></div>
              <div class="finding-explanation" x-text="f.erklaerung"></div>
            </span>
          </label>
        </template>
      </div>
    </template>

    <!-- Stilanmerkungen-Sektion -->
    <template x-if="lektoratStyles.length > 0">
      <div>
        <div class="section-heading-top finding-header">
          <span>Stilanmerkungen</span>
          <div class="finding-toggle-group">
            <button class="btn-sm" @click="selectAllStyles(true)">Alle</button>
            <button class="btn-sm" @click="selectAllStyles(false)">Keine</button>
          </div>
        </div>
        <template x-for="(f, i) in lektoratStyles" :key="i">
          <label class="finding style" :class="{ 'finding-deselected': !selectedStyles[i] }">
            <input type="checkbox" class="finding-checkbox" :checked="selectedStyles[i]" @change="toggleStyle(i)">
            <span class="badge badge-warn">Stil</span>
            <span class="finding-content">
              <del x-text="f.original"></del> → <ins x-text="f.korrektur"></ins>
              <div class="finding-context" x-show="f.kontext" x-text="'«' + f.kontext + '»'"></div>
              <div class="finding-explanation" x-text="f.erklaerung"></div>
            </span>
          </label>
        </template>
      </div>
    </template>

    <!-- Stilanalyse & Fazit + Vorschau -->
    <div x-html="analysisOut"></div>
  </div>

  <!-- Verlauf dieser Seite -->
  <div x-show="pageHistory.length > 0" class="card-history-section">
    <div class="history-heading">Verlauf</div>
    <template x-for="entry in pageHistory" :key="entry.id">
      <div>
        <div class="history-item" @click="selectedHistoryId = selectedHistoryId === entry.id ? null : entry.id; if (selectedHistoryId === entry.id) initHistorySelection(entry)">
          <span class="history-date" x-text="formatDate(entry.checked_at)"></span>
          <span class="badge" :class="entry.error_count > 0 ? 'badge-err' : 'badge-ok'" x-text="entry.error_count > 0 ? entry.error_count + ' Fehler' : 'fehlerfrei'"></span>
          <button class="btn-toggle-saved" :class="entry.saved ? 'btn-toggle-saved--on' : 'btn-toggle-saved--off'" @click.stop="toggleHistoryEntrySaved(entry)" :title="entry.saved ? 'Als nicht umgesetzt markieren' : 'Als umgesetzt markieren'" x-text="entry.saved ? '✓ umgesetzt' : 'nicht umgesetzt'"></button>
          <span class="tag" x-text="entry.model"></span>
          <span class="history-chevron" :class="{ open: selectedHistoryId === entry.id }">›</span>
        </div>
        <div x-show="selectedHistoryId === entry.id" class="history-detail">
          <div x-show="entry.saved" class="history-saved-notice history-saved-notice-ok">
            Korrekturen am <span x-text="formatDate(entry.saved_at)"></span> in BookStack gespeichert.
          </div>
          <div x-show="!entry.saved && entry.error_count > 0" class="history-saved-notice history-saved-notice-warn">
            Korrekturen wurden nicht in BookStack übernommen.
          </div>

          <!-- Gespeicherte Einträge: readonly-Ansicht mit Markierung was angewendet wurde (nur wenn alles umgesetzt) -->
          <template x-if="entry.saved && !historyHasUnapplied(entry) && entry.errors_json && entry.errors_json.length > 0">
            <div class="history-detail-block">
              <!-- Fehler -->
              <template x-if="entry.errors_json.filter(f => f.typ !== 'stil').length > 0">
                <div>
                  <div class="section-heading" x-text="entry.errors_json.filter(f => f.typ !== 'stil').length + ' Fehler'"></div>
                  <template x-for="(f, i) in entry.errors_json.filter(f => f.typ !== 'stil')" :key="i">
                    <div class="finding error" :class="entry.selected_errors_json && !entry.selected_errors_json.some(a => a.original === f.original) ? 'finding-deselected' : ''">
                      <span class="badge" :class="({'rechtschreibung':1,'grammatik':1,'tempuswechsel':1}[f.typ]) ? 'badge-err' : 'badge-warn'" x-text="({'wiederholung':'Wdh.','schwaches_verb':'schw. Verb','fuellwort':'Füllwort','show_vs_tell':'Show/Tell','passiv':'Passiv','perspektivbruch':'Perspektive','tempuswechsel':'Tempus'})[f.typ] || f.typ"></span>
                      <span class="finding-content">
                        <del x-text="f.original"></del> → <ins x-text="f.korrektur"></ins>
                        <div class="finding-context" x-show="f.kontext" x-text="'«' + f.kontext + '»'"></div>
                        <div class="finding-explanation" x-text="f.erklaerung"></div>
                      </span>
                    </div>
                  </template>
                </div>
              </template>
              <!-- Stilanmerkungen -->
              <template x-if="entry.errors_json.filter(f => f.typ === 'stil').length > 0">
                <div>
                  <div class="section-heading-top">Stilanmerkungen</div>
                  <template x-for="(f, i) in entry.errors_json.filter(f => f.typ === 'stil')" :key="i">
                    <div class="finding style" :class="entry.selected_errors_json && !entry.selected_errors_json.some(a => a.original === f.original) ? 'finding-deselected' : ''">
                      <span class="badge badge-warn">Stil</span>
                      <span class="finding-content">
                        <del x-text="f.original"></del> → <ins x-text="f.korrektur"></ins>
                        <div class="finding-context" x-show="f.kontext" x-text="'«' + f.kontext + '»'"></div>
                        <div class="finding-explanation" x-text="f.erklaerung"></div>
                      </span>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <!-- Interaktive Selektion: solange noch nicht umgesetzte Korrekturen vorhanden -->
          <template x-if="historyHasUnapplied(entry) && entry.errors_json && entry.errors_json.length > 0 && historySelections[entry.id]">
            <div class="history-detail-block">
              <!-- Fehler -->
              <template x-if="historyErrors(entry).length > 0">
                <div>
                  <div class="section-heading finding-header">
                    <span x-text="historyErrors(entry).length + ' Fehler'"></span>
                    <div class="finding-toggle-group">
                      <button class="btn-sm" @click.stop="historySelections[entry.id].errors = historySelections[entry.id].errors.map(() => true)">Alle</button>
                      <button class="btn-sm" @click.stop="historySelections[entry.id].errors = historySelections[entry.id].errors.map(() => false)">Keine</button>
                    </div>
                  </div>
                  <template x-for="(f, i) in historyErrors(entry)" :key="i">
                    <label class="finding error" :class="{ 'finding-deselected': !historySelections[entry.id].errors[i] }">
                      <input type="checkbox" class="finding-checkbox" :checked="historySelections[entry.id].errors[i]" @change.stop="toggleHistoryError(entry.id, i)">
                      <span class="badge" :class="({'rechtschreibung':1,'grammatik':1,'tempuswechsel':1}[f.typ]) ? 'badge-err' : 'badge-warn'" x-text="({'wiederholung':'Wdh.','schwaches_verb':'schw. Verb','fuellwort':'Füllwort','show_vs_tell':'Show/Tell','passiv':'Passiv','perspektivbruch':'Perspektive','tempuswechsel':'Tempus'})[f.typ] || f.typ"></span>
                      <span class="finding-content">
                        <del x-text="f.original"></del> → <ins x-text="f.korrektur"></ins>
                        <div class="finding-context" x-show="f.kontext" x-text="'«' + f.kontext + '»'"></div>
                        <div class="finding-explanation" x-text="f.erklaerung"></div>
                      </span>
                    </label>
                  </template>
                </div>
              </template>
              <!-- Stilanmerkungen -->
              <template x-if="historyStyles(entry).length > 0">
                <div>
                  <div class="section-heading-top finding-header">
                    <span>Stilanmerkungen</span>
                    <div class="finding-toggle-group">
                      <button class="btn-sm" @click.stop="historySelections[entry.id].styles = historySelections[entry.id].styles.map(() => true)">Alle</button>
                      <button class="btn-sm" @click.stop="historySelections[entry.id].styles = historySelections[entry.id].styles.map(() => false)">Keine</button>
                    </div>
                  </div>
                  <template x-for="(f, i) in historyStyles(entry)" :key="i">
                    <label class="finding style" :class="{ 'finding-deselected': !historySelections[entry.id].styles[i] }">
                      <input type="checkbox" class="finding-checkbox" :checked="historySelections[entry.id].styles[i]" @change.stop="toggleHistoryStyle(entry.id, i)">
                      <span class="badge badge-warn">Stil</span>
                      <span class="finding-content">
                        <del x-text="f.original"></del> → <ins x-text="f.korrektur"></ins>
                        <div class="finding-context" x-show="f.kontext" x-text="'«' + f.kontext + '»'"></div>
                        <div class="finding-explanation" x-text="f.erklaerung"></div>
                      </span>
                    </label>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <template x-if="entry.szenen_json && entry.szenen_json.length > 0">
            <div class="stilbox stilbox--spaced">
              <div class="bewertung-section-title">Szenen</div>
              <template x-for="(s, si) in entry.szenen_json" :key="si">
                <div class="szene-item">
                  <div class="szene-header">
                    <span class="badge" :class="s.wertung === 'stark' ? 'badge-ok' : s.wertung === 'schwach' ? 'badge-err' : 'badge-warn'" x-text="s.wertung"></span>
                    <span class="szene-titel" x-text="s.titel"></span>
                  </div>
                  <div class="szene-kommentar" x-show="s.kommentar" x-text="s.kommentar"></div>
                </div>
              </template>
            </div>
          </template>
          <div x-show="entry.stilanalyse" class="stilbox stilbox--spaced">
            <div class="bewertung-section-title">Stilanalyse</div>
            <span x-text="entry.stilanalyse"></span>
          </div>
          <div x-show="entry.fazit" class="fazit" x-text="entry.fazit"></div>
          <div class="history-actions">
            <button x-show="entry.error_count > 0 && currentPage" @click.stop="showHistoryInEditor(entry)" title="Fehler im Seitentext hervorheben">Im Text anzeigen</button>
            <button x-show="historyHasUnapplied(entry) && entry.error_count > 0 && currentPage" class="btn-apply-history" :disabled="historyApplying[entry.id] != null" @click.stop="applyHistoryCheck(entry)">
              <span x-show="historyApplying[entry.id] != null" class="spinner"></span><span x-text="historyApplying[entry.id] != null ? 'Wird übernommen…' : 'In BookStack übernehmen'"></span>
            </button>
            <button class="btn-delete-history" :disabled="historyApplying[entry.id] != null" @click.stop="deletePageCheck(entry.id)" title="Eintrag löschen">Eintrag löschen</button>
          </div>
          <div class="progress-bar-wrap progress-bar-wrap--history" x-show="historyApplying[entry.id] != null">
            <div class="progress-bar" :style="'width:' + (historyApplying[entry.id] || 0) + '%'"></div>
          </div>
        </div>
      </div>
    </template>
  </div>
</div>
