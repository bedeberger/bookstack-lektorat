<!-- Seiteneditor & Lektorat -->
<div class="card" id="editor-card" x-show="showEditorCard" x-cloak x-transition>
  <div class="card-header">
    <div>
      <span class="card-title" x-text="t('editor.title', { name: currentPage?.name || '–' })"></span>
      <span class="save-indicator" x-show="lastSavedLabel()"
            :class="{ 'save-indicator--draft': lastSavedKind() === 'draft', 'save-indicator--offline': saveOffline }"
            x-text="lastSavedKind() === 'draft' ? t('editor.draft', { when: lastSavedLabel() }) : t('editor.saved', { when: lastSavedLabel() })"
            :title="lastSavedKind() === 'draft' ? t('editor.draftTitle') : t('editor.savedTitle')"></span>
      <a x-show="currentPage?.url" :href="currentPage?.url" target="_blank" rel="noopener" class="tag tag--link" x-text="t('editor.openInBookstack')"></a>
      <span x-show="currentPage && tokEsts[currentPage.id]" class="tok-stats">
        <template x-if="tokEsts[currentPage?.id]?.words > 0">
          <span class="display-contents">
            <span class="tok-badge tok-neutral"
              x-text="tokEsts[currentPage.id]?.chars >= 1000 ? '~' + Math.round(tokEsts[currentPage.id].chars/1000) + 'k Z' : tokEsts[currentPage.id]?.chars + ' Z'"></span>
            <span class="tok-badge tok-neutral"
              x-text="tokEsts[currentPage.id]?.words >= 1000 ? '~' + Math.round(tokEsts[currentPage.id].words/1000) + 'k W' : tokEsts[currentPage.id]?.words + ' W'"></span>
            <span class="tok-badge"
              :class="tokEsts[currentPage.id]?.tok > 16000 ? 'tok-high' : tokEsts[currentPage.id]?.tok > 4000 ? 'tok-med' : 'tok-ok'"
              x-text="tokEsts[currentPage.id]?.tok >= 1000 ? '~' + Math.round(tokEsts[currentPage.id].tok/1000) + 'k T' : '~' + tokEsts[currentPage.id]?.tok + ' T'"
              ></span>
          </span>
        </template>
        <template x-if="tokEsts[currentPage?.id] && tokEsts[currentPage.id].words === 0">
          <span class="tok-badge tok-empty" x-text="t('sidebar.empty')"></span>
        </template>
      </span>
    </div>
    <div class="card-actions">
      <template x-if="!editMode">
        <span class="display-contents">
          <button @click="runCheck()" :disabled="checkLoading || currentPageEmpty" :title="currentPageEmpty ? t('editor.btn.pageEmpty') : t('editor.btn.checkTitle')" x-text="t('editor.btn.check')"></button>
          <button @click="startEdit()" :disabled="checkLoading || saveApplying != null || !originalHtml" :title="t('editor.btn.editTitle')" x-text="t('editor.btn.edit')"></button>
          <button @click="startFocusEdit()" :disabled="checkLoading || saveApplying != null || !originalHtml" :title="t('editor.btn.focusTitle')" x-text="t('editor.btn.focus')"></button>
          <button @click="closeFindings()" x-show="checkDone" :title="t('editor.btn.exitCheckTitle')" x-text="t('editor.btn.exitCheck')"></button>
          <button class="success" @click="saveCorrections()" :disabled="saveApplying != null" x-show="(correctedHtml && selectedFindings.some(v => v)) || saveApplying != null">
            <span x-show="saveApplying != null" class="spinner"></span><span x-text="saveApplying != null ? t('editor.btn.saveCorrectionsProgress') : t('editor.btn.saveCorrections')"></span>
          </button>
          <button @click="toggleChatCard()" :class="{ primary: showChatCard }" :disabled="currentPageEmpty" :title="t('editor.btn.chatTitle')" x-text="t('editor.btn.chat')"></button>
        </span>
      </template>
      <template x-if="editMode">
        <span class="display-contents">
          <button class="success" @click="saveEdit()" :disabled="editSaving">
            <span x-show="editSaving" class="spinner"></span><span x-text="editSaving ? t('common.saving') : t('common.save')"></span>
          </button>
          <button @click="cancelEdit()" :disabled="editSaving" x-text="t('common.cancel')"></button>
          <button @click="closeFindings()" x-show="checkDone && !focusMode" :title="t('editor.btn.exitCheckTitle')" x-text="t('editor.btn.exitCheck')"></button>
          <button @click="toggleFocusMode()" :class="{ primary: focusMode }" :title="focusMode ? t('editor.btn.leaveFocusTitle') : t('editor.btn.enterFocusTitle')" x-text="focusMode ? t('editor.btn.leaveFocus') : t('editor.btn.focusShort')"></button>
        </span>
      </template>
    </div>
  </div>
  <div class="progress-bar-wrap" x-show="checkProgress > 0 || saveApplying != null">
    <div class="progress-bar" :style="'width:' + (checkProgress || saveApplying || 0) + '%'"></div>
  </div>
  <div id="status" x-html="statusHtml"></div>

  <!-- Figurenkontext-Panel (collapsible) -->
  <template x-if="chapterFigures.length > 0">
    <div class="figure-context-panel">
      <div class="figure-context-header" @click="showChapterFigures = !showChapterFigures">
        <span class="figure-context-title">
          <span class="figure-context-icon">F</span>
          <span x-text="t('editor.figuresInChapter', { n: chapterFigures.length })"></span>
        </span>
        <span class="history-chevron" :class="{ open: showChapterFigures }">›</span>
      </div>
      <div x-show="showChapterFigures" x-cloak class="figure-context-body">
        <template x-for="(fig, fi) in chapterFigures" :key="fi">
          <span class="figure-context-chip" x-data="{ show: false }" @mouseenter="show = true" @mouseleave="show = false">
            <span x-text="fig.kurzname || fig.name"></span>
            <span x-show="fig.typ" class="tag" x-text="t('figuren.type.' + fig.typ)"></span>
            <div x-show="show" x-cloak class="figure-context-tooltip">
              <div class="figure-context-tooltip-name" x-text="fig.name"></div>
              <div x-show="fig.beruf" class="figure-context-tooltip-row"><span class="figure-context-label" x-text="t('figuren.field.beruf')"></span> <span x-text="fig.beruf"></span></div>
              <div x-show="fig.geschlecht" class="figure-context-tooltip-row"><span class="figure-context-label" x-text="t('editor.field.geschlecht')"></span> <span x-text="fig.geschlecht"></span></div>
              <div x-show="fig.beschreibung" class="figure-context-tooltip-desc" x-text="fig.beschreibung"></div>
            </div>
          </span>
        </template>
      </div>
    </div>
  </template>

  <!-- Synonym-Kontextmenü (an body teleportiert, damit position:fixed
       nicht vom card-Transform-Context eingefangen wird) -->
  <template x-teleport="body">
    <div x-show="showSynonymMenu" x-cloak class="synonym-menu"
         :style="{ left: synonymMenuX + 'px', top: synonymMenuY + 'px' }"
         @click.outside="closeSynonymMenu()"
         @keydown.escape.window="closeSynonymMenu()">
      <button class="synonym-menu-btn" @click="requestSynonyms()" x-text="t('editor.synonym.searchFor', { word: _synonymWord })"></button>
    </div>
  </template>

  <!-- Synonym-Picker -->
  <template x-teleport="body">
    <div x-show="showSynonymPicker" x-cloak class="synonym-picker"
         :style="{ left: synonymMenuX + 'px', top: synonymMenuY + 'px' }"
         @click.outside="closeSynonymPicker()"
         @keydown.escape.window="closeSynonymPicker()">
      <div class="synonym-picker-header">
        <span x-text="t('editor.synonym.titleFor', { word: _synonymWord })"></span>
        <button class="synonym-picker-close" @click="closeSynonymPicker()" :title="t('common.close')">×</button>
      </div>

      <div class="synonym-picker-body">
        <div class="synonym-picker-section" x-show="!synonymThesDisabled">
          <div class="synonym-picker-subheader" x-text="t('editor.synonym.thesaurus')"></div>
          <div x-show="synonymThesLoading" class="synonym-picker-loading">
            <span class="spinner"></span> <span x-text="t('editor.synonym.loading')"></span>
          </div>
          <div x-show="!synonymThesLoading && synonymThesError" class="synonym-picker-error" x-text="synonymThesError"></div>
          <div x-show="!synonymThesLoading && !synonymThesError && synonymThesList.length > 0" class="synonym-picker-list">
            <template x-for="(s, i) in synonymThesList" :key="'t'+i">
              <button class="synonym-entry" @click="applySynonym(s)">
                <span class="synonym-word" x-text="s.wort"></span>
                <span x-show="s.hinweis" class="synonym-hint" x-text="s.hinweis"></span>
              </button>
            </template>
          </div>
        </div>

        <div class="synonym-picker-section">
          <div class="synonym-picker-subheader" x-text="t('editor.synonym.ki')"></div>
          <div x-show="synonymKiLoading" class="synonym-picker-loading">
            <span class="spinner"></span> <span x-text="t('editor.synonym.kiLoading')"></span>
          </div>
          <div x-show="!synonymKiLoading && synonymKiError" class="synonym-picker-error" x-text="synonymKiError"></div>
          <div x-show="!synonymKiLoading && !synonymKiError && synonymKiList.length > 0" class="synonym-picker-list">
            <template x-for="(s, i) in synonymKiList" :key="'k'+i">
              <button class="synonym-entry" @click="applySynonym(s)">
                <span class="synonym-word" x-text="s.wort"></span>
                <span x-show="s.hinweis" class="synonym-hint" x-text="s.hinweis"></span>
              </button>
            </template>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- Figuren-Lookup-Popover (Ctrl/Cmd-Klick auf Figurenname im Edit-/Fokusmodus) -->
  <template x-teleport="body">
    <div x-show="showFigurLookup" x-cloak class="figur-lookup"
         :style="{ left: figurLookupX + 'px', top: figurLookupY + 'px' }"
         @click.outside="closeFigurLookup()"
         @keydown.escape.window="closeFigurLookup()">
      <template x-if="figurLookupData">
        <div>
          <div class="figur-lookup-header">
            <span class="figur-lookup-name" x-text="figurLookupData.name"></span>
            <button class="figur-lookup-close" @click="closeFigurLookup()" :title="t('common.close')">×</button>
          </div>
          <div class="figur-lookup-body">
            <div x-show="figurLookupGeburt()" class="figur-lookup-row">
              <span class="figur-lookup-label" x-text="t('figurLookup.geburt')"></span>
              <span x-text="figurLookupGeburt()"></span>
            </div>
            <div x-show="(figurLookupData.eigenschaften || []).length > 0" class="figur-lookup-tags">
              <template x-for="(tag, ti) in (figurLookupData.eigenschaften || [])" :key="ti">
                <span class="tag" x-text="tag"></span>
              </template>
            </div>
            <div x-show="figurLookupData.beruf || figurLookupData.rolle" class="figur-lookup-meta">
              <span x-show="figurLookupData.beruf" x-text="figurLookupData.beruf"></span>
              <span x-show="figurLookupData.beruf && figurLookupData.rolle" class="figur-lookup-meta-sep"> · </span>
              <span x-show="figurLookupData.rolle" x-text="figurLookupData.rolle"></span>
            </div>
          </div>
          <div x-show="editMode && !focusMode" class="figur-lookup-footer">
            <button class="figur-lookup-link" @click="openFigurLookupTarget()" x-text="t('figurLookup.open')"></button>
          </div>
        </div>
      </template>
    </div>
  </template>

  <!-- Preview + optional Befunde: Layout wird zum Split, sobald geprüft wurde.
       editMode zeigt contenteditable statt Preview (Findings bleiben rechts sichtbar). -->
  <div class="editor-body-wrap" :class="checkDone ? 'lektorat-split' : ''">
    <div class="editor-preview-wrap" :class="checkDone ? 'lektorat-split-preview' : ''">
      <div id="partial-editor-body-edit"></div>
      <div id="partial-editor-body-view"></div>
    </div>
    <div x-show="checkDone" class="lektorat-split-findings">

      <!-- Fehlerfrei -->
      <div x-show="lektoratFindings.length === 0" class="finding ok">
        <span class="badge badge-ok" x-text="t('editor.findings.okBadge')"></span> &nbsp;<span x-text="t('editor.findings.ok')"></span>
      </div>

      <!-- Findings-Sektion (Fehler + Stilanmerkungen, in Lesereihenfolge) -->
      <template x-if="lektoratFindings.length > 0">
        <div>
          <div class="section-heading finding-header">
            <span x-text="t('editor.findings.count', { n: lektoratFindings.length })"></span>
            <div class="finding-toggle-group">
              <button class="btn-sm" @click="selectAllFindings(true)" x-text="t('editor.findings.selectAll')"></button>
              <button class="btn-sm" @click="selectAllFindings(false)" x-text="t('editor.findings.selectNone')"></button>
            </div>
          </div>
          <template x-for="(f, i) in lektoratFindings" :key="i">
            <label class="finding" :class="{ 'error': f.typ !== 'stil', 'style': f.typ === 'stil', 'finding-deselected': !selectedFindings[i], 'finding--applied': appliedOriginals.includes(f.original) }" :data-finding-idx="i" @pointerenter="handleFindingPointer(i)">
              <input type="checkbox" class="finding-checkbox" :checked="selectedFindings[i]" :disabled="appliedOriginals.includes(f.original)" @change="toggleFinding(i)">
              <span class="badge" :class="({'rechtschreibung':1,'grammatik':1,'tempuswechsel':1}[f.typ]) ? 'badge-err' : 'badge-warn'" x-text="t('finding.' + f.typ)"></span>
              <span x-show="appliedOriginals.includes(f.original)" class="tag" x-text="t('editor.findings.applied')"></span>
              <span class="finding-content">
                <del x-text="f.original"></del> → <ins x-text="f.korrektur"></ins>
                <div class="finding-explanation" x-text="f.erklaerung"></div>
              </span>
            </label>
          </template>
        </div>
      </template>

      <!-- Stilanalyse & Fazit -->
      <div x-html="analysisOut"></div>
    </div>
  </div>

  <!-- Verlauf dieser Seite (kompakte Leiste) -->
  <div x-show="pageHistory.length > 0" class="history-bar">
    <div class="history-heading" x-text="t('editor.history')"></div>
    <template x-for="entry in pageHistory" :key="entry.id">
      <div class="history-item" :class="{ 'history-item--active': activeHistoryEntryId === entry.id }" @click="loadHistoryEntry(entry)">
        <span class="history-date" x-text="formatDate(entry.checked_at)"></span>
        <span class="badge" :class="entry.error_count > 0 ? 'badge-err' : 'badge-ok'" x-text="entry.error_count > 0 ? t('editor.history.errors', { n: entry.error_count }) : t('editor.history.errorFree')"></span>
        <button class="btn-toggle-saved" :class="entry.saved ? 'btn-toggle-saved--on' : 'btn-toggle-saved--off'" @click.stop="toggleHistoryEntrySaved(entry)" :title="entry.saved ? t('editor.history.markOpen') : t('editor.history.markDone')" x-text="entry.saved ? t('editor.history.done') : t('editor.history.open')"></button>
        <span class="tag" x-text="entry.model"></span>
        <button class="history-item-delete" @click.stop="deletePageCheck(entry.id)" :title="t('common.deleteEntry')">×</button>
      </div>
    </template>
  </div>
</div>
