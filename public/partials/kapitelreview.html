<!-- Kapitel-Review: Makrobewertung + verdichtete Seitenstatistik eines Kapitels -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/kapitel-review-card.js.
  `showKapitelReviewCard` bleibt am Root. Fachlicher State + Job-Flow in der
  Sub. `newPageTitle/newPageCreating/newPageError` bleiben am Root (von
  createKapitelPage() in der Sub via $root gelesen/geschrieben).
-->
<div class="card" x-data="kapitelReviewCard" x-show="$root.showKapitelReviewCard" x-cloak x-transition>
  <div class="card-header">
    <span class="card-title" x-text="$root.t('kapitelReview.title', { name: kapitelReviewSelectedChapter()?.name || $root.selectedBookName })"></span>
    <div class="card-actions">
      <button type="button"
              @click="runKapitelReview()"
              :disabled="kapitelReviewLoading || !kapitelReviewChapterId">
        <span x-show="kapitelReviewLoading" class="spinner"></span>
        <span x-text="kapitelReviewOut ? $root.t('kapitelReview.rerun') : $root.t('kapitelReview.start')"></span>
      </button>
    </div>
  </div>

  <!-- Seitenstatistik des gewählten Kapitels – klickbar zur Seite -->
  <template x-if="kapitelReviewSelectedChapter()">
    <div class="kapitel-pages-section">
      <div class="kapitel-pages-heading" x-text="$root.t('kapitelReview.pagesHeading', { n: kapitelReviewSelectedChapter().pages.length })"></div>
      <div class="kapitel-pages-list">
        <template x-for="page in kapitelReviewSelectedChapter().pages" :key="page.id">
          <div class="kapitel-page-row" @click="$root.selectPage(page)" :title="$root.pageStatusTooltip(page)">
            <span class="kapitel-page-name">
              <span class="page-status-dot" :class="'page-status-' + $root.pageStatus(page)"></span>
              <span x-text="page.name"></span>
            </span>
            <span class="kapitel-page-stats">
              <template x-if="$root.tokEsts[page.id] && $root.tokEsts[page.id].words > 0">
                <span class="tok-badge tok-neutral"
                  x-text="$root.tokEsts[page.id].chars >= 1000 ? '~' + Math.round($root.tokEsts[page.id].chars / 1000) + 'k Z' : $root.tokEsts[page.id].chars + ' Z'"></span>
              </template>
              <template x-if="$root.tokEsts[page.id] && $root.tokEsts[page.id].words === 0">
                <span class="tok-badge tok-empty" x-text="$root.t('sidebar.empty')"></span>
              </template>
            </span>
          </div>
        </template>
      </div>

      <!-- Schnell eine neue Seite anlegen (Titel → am Ende des Kapitels einfügen) -->
      <form class="kapitel-new-page" @submit.prevent="createKapitelPage()">
        <input type="text"
               class="kapitel-new-page-input"
               x-model="$root.newPageTitle"
               :placeholder="$root.t('kapitelReview.newPagePlaceholder')"
               :disabled="$root.newPageCreating">
        <button type="submit"
                :disabled="$root.newPageCreating || !$root.newPageTitle.trim()">
          <span x-show="$root.newPageCreating" class="spinner"></span>
          <span x-text="$root.t('kapitelReview.newPageAdd')"></span>
        </button>
      </form>
      <div x-show="$root.newPageError" class="error-msg" x-text="$root.newPageError"></div>
    </div>
  </template>

  <div class="progress-bar-wrap" x-show="kapitelReviewProgress > 0 && String(_kapitelReviewRunningChapterId) === String(kapitelReviewChapterId)">
    <div class="progress-bar" :style="{ '--progress': kapitelReviewProgress + '%' }"></div>
  </div>
  <div class="card-status" x-html="kapitelReviewStatus"></div>
  <div x-html="kapitelReviewOut"></div>

  <!-- Verlauf für das aktuell gewählte Kapitel -->
  <div x-show="kapitelReviewCurrentHistory().length > 0" class="card-history-section">
    <div class="history-heading" x-text="$root.t('kapitelReview.history')"></div>
    <template x-for="entry in kapitelReviewCurrentHistory()" :key="entry.id">
      <div>
        <div class="history-item" :class="{ 'history-item--open': selectedKapitelReviewId === entry.id }"
             @click="selectedKapitelReviewId = selectedKapitelReviewId === entry.id ? null : entry.id">
          <span class="history-date" x-text="$root.formatDate(entry.reviewed_at)"></span>
          <span x-show="entry.review_json?.gesamtnote" class="badge badge-ok review-stars"
            x-text="'★'.repeat(Math.min(6, +(entry.review_json?.gesamtnote) || 0)) + '☆'.repeat(Math.max(0, 6 - (+(entry.review_json?.gesamtnote) || 0)))"></span>
          <span class="tag" x-text="entry.model"></span>
          <span class="history-chevron" :class="{ open: selectedKapitelReviewId === entry.id }">›</span>
        </div>
        <div x-show="selectedKapitelReviewId === entry.id" class="history-detail">
          <div x-html="entry.review_json ? _renderKapitelReviewHtml(entry.review_json) : ''"></div>
          <button type="button" class="btn-delete-history" @click.stop="deleteKapitelReview(entry.id)" :title="$root.t('common.deleteEntry')" x-text="$root.t('common.deleteEntry')"></button>
        </div>
      </div>
    </template>
  </div>
</div>
