<!-- Buch-Einstellungen -->
<!--
  Alpine.data-Sub-Komponente — siehe public/js/cards/book-settings-card.js.
  `showBookSettingsCard` bleibt im Root, fachlicher State in dieser Komponente.
-->
<div class="card" x-data="bookSettingsCard" x-show="$app.showBookSettingsCard" x-cloak>
  <div class="card-header">
    <span class="card-title" x-text="$app.t('book.settings.title', { name: $app.selectedBookName })"></span>
    <div class="card-actions">
      <button type="button" @click="saveBookSettings()" :disabled="bookSettingsSaving || bookSettingsLoading">
        <span x-show="bookSettingsSaving" class="spinner"></span>
        <span x-text="bookSettingsSaving ? $app.t('common.saving') : $app.t('common.save')"></span>
      </button>
    </div>
  </div>

  <div x-show="bookSettingsLoading" class="muted-msg" x-text="$app.t('common.loading')"></div>

  <div x-show="!bookSettingsLoading" class="book-settings-form">

    <div class="book-settings-row">
      <label class="book-settings-label" x-text="$app.t('book.settings.language')"></label>
      <div class="book-settings-options">
        <label class="book-settings-option">
          <input type="radio" name="bs-lang" value="de" x-model="bookSettingsLanguage" @change="bookSettingsRegion = (bookSettingsLanguage === 'de' ? 'CH' : 'US'); bookSettingsBuchtyp = ''">
          <span x-text="$app.t('lang.de')"></span>
        </label>
        <label class="book-settings-option">
          <input type="radio" name="bs-lang" value="en" x-model="bookSettingsLanguage" @change="bookSettingsRegion = (bookSettingsLanguage === 'de' ? 'CH' : 'US'); bookSettingsBuchtyp = ''">
          <span x-text="$app.t('lang.en')"></span>
        </label>
      </div>
    </div>

    <div class="book-settings-row">
      <label class="book-settings-label" x-text="$app.t('book.settings.region')"></label>
      <div class="book-settings-options">
        <template x-if="bookSettingsLanguage === 'de'">
          <div class="book-settings-options">
            <label class="book-settings-option">
              <input type="radio" name="bs-region" value="CH" x-model="bookSettingsRegion">
              <span x-text="$app.t('region.de.CH')"></span>
            </label>
            <label class="book-settings-option">
              <input type="radio" name="bs-region" value="DE" x-model="bookSettingsRegion">
              <span x-text="$app.t('region.de.DE')"></span>
            </label>
          </div>
        </template>
        <template x-if="bookSettingsLanguage === 'en'">
          <div class="book-settings-options">
            <label class="book-settings-option">
              <input type="radio" name="bs-region" value="US" x-model="bookSettingsRegion">
              <span x-text="$app.t('region.en.US')"></span>
            </label>
            <label class="book-settings-option">
              <input type="radio" name="bs-region" value="GB" x-model="bookSettingsRegion">
              <span x-text="$app.t('region.en.GB')"></span>
            </label>
          </div>
        </template>
      </div>
    </div>

    <div class="book-settings-row">
      <label class="book-settings-label" for="bs-buchtyp" x-text="$app.t('book.settings.buchtyp')"></label>
      <select id="bs-buchtyp" class="book-settings-select" x-model="bookSettingsBuchtyp">
        <option value="" x-text="$app.t('book.settings.buchtyp.none')"></option>
        <template x-for="typ in bookSettingsBuchtypen()" :key="typ.key">
          <option :value="typ.key" x-text="typ.label"></option>
        </template>
      </select>
    </div>

    <div class="book-settings-row">
      <label class="book-settings-label" for="bs-pov" x-text="$app.t('book.settings.pov')"></label>
      <select id="bs-pov" class="book-settings-select" x-model="bookSettingsErzaehlperspektive">
        <option value="" x-text="$app.t('book.settings.pov.none')"></option>
        <option value="ich" x-text="$app.t('book.settings.pov.ich')"></option>
        <option value="er_sie_personal" x-text="$app.t('book.settings.pov.er_personal')"></option>
        <option value="er_sie_auktorial" x-text="$app.t('book.settings.pov.er_auktorial')"></option>
        <option value="du" x-text="$app.t('book.settings.pov.du')"></option>
        <option value="wir" x-text="$app.t('book.settings.pov.wir')"></option>
        <option value="gemischt" x-text="$app.t('book.settings.pov.gemischt')"></option>
      </select>
    </div>

    <div class="book-settings-row">
      <label class="book-settings-label" for="bs-tempus" x-text="$app.t('book.settings.tempus')"></label>
      <select id="bs-tempus" class="book-settings-select" x-model="bookSettingsErzaehlzeit">
        <option value="" x-text="$app.t('book.settings.tempus.none')"></option>
        <option value="praeteritum" x-text="$app.t('book.settings.tempus.praeteritum')"></option>
        <option value="praesens" x-text="$app.t('book.settings.tempus.praesens')"></option>
        <option value="gemischt" x-text="$app.t('book.settings.tempus.gemischt')"></option>
      </select>
    </div>

    <p class="book-settings-hint"
       x-show="bookSettingsBuchtyp === 'kurzgeschichten' && (bookSettingsErzaehlperspektive || bookSettingsErzaehlzeit)"
       x-text="$app.t('book.settings.pov.kurzgeschichtenHint')"></p>

    <div class="book-settings-row book-settings-row--top">
      <label class="book-settings-label" for="bs-buchkontext" x-text="$app.t('book.settings.context')"></label>
      <div class="book-settings-kontext-wrap">
        <textarea
          id="bs-buchkontext"
          class="book-settings-textarea"
          x-model="bookSettingsBuchKontext"
          :placeholder="$app.t('book.settings.contextPlaceholder')"
          rows="4"
          maxlength="1000"
        ></textarea>
        <p class="book-settings-hint" x-text="(bookSettingsBuchKontext || '').length + ' / 1000'"></p>
      </div>
    </div>

    <p class="book-settings-saved" x-show="bookSettingsSaved" x-text="$app.t('common.settingsSaved')"></p>
    <p class="book-settings-error" x-show="bookSettingsError" x-text="bookSettingsError"></p>

    <section class="book-settings-stats">
      <h3 class="book-settings-stats-title" x-text="$app.t('jobStats.title')"></h3>
      <div x-show="bookJobStatsLoading && !bookJobStats" class="job-stats-loading" x-text="$app.t('jobStats.loading')"></div>
      <div x-show="bookJobStats && bookJobStats.length === 0" class="job-stats-empty" x-text="$app.t('jobStats.empty')"></div>
      <div x-show="bookJobStats && bookJobStats.length > 0" class="job-stats-scroll">
      <table class="job-stats-table">
        <thead>
          <tr>
            <th x-text="$app.t('jobStats.col.type')"></th>
            <th :title="$app.t('jobStats.col.avgDurationTitle')" x-text="$app.t('jobStats.col.avgDuration')"></th>
            <th :title="$app.t('jobStats.col.avgTokensTitle')" x-text="$app.t('jobStats.col.avgTokens')"></th>
            <th x-text="$app.t('jobStats.col.lastRun')"></th>
            <th :title="$app.t('jobStats.col.runsTitle')" x-text="$app.t('jobStats.col.runs')"></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="row in bookJobStats" :key="row.type">
            <tr>
              <td x-text="$app.t(row.typeLabel)"></td>
              <td x-text="row.avgDurationFmt"></td>
              <td x-text="row.avgTokensFmt"></td>
              <td x-text="$app.formatLastRun(row.lastRun)"></td>
              <td>
                <span x-text="row.count"></span>
                <span x-show="row.errorCount > 0" class="job-stats-errors" x-text="' / ' + row.errorCount + ' ✕'"></span>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      </div>
    </section>
  </div>
</div>
