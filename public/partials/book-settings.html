<!-- Buch-Einstellungen -->
<div class="card" x-show="showBookSettingsCard" x-cloak x-transition>
  <div class="card-header">
    <span class="card-title" x-text="'Einstellungen: ' + selectedBookName"></span>
    <div class="card-actions">
      <button @click="saveBookSettings()" :disabled="bookSettingsSaving || bookSettingsLoading">
        <span x-show="bookSettingsSaving" class="spinner"></span>
        <span x-text="bookSettingsSaving ? 'Speichert…' : 'Speichern'"></span>
      </button>
    </div>
  </div>

  <div x-show="bookSettingsLoading" class="muted-msg">Einstellungen werden geladen…</div>

  <div x-show="!bookSettingsLoading" class="book-settings-form">

    <div class="book-settings-row">
      <label class="book-settings-label">Sprache</label>
      <div class="book-settings-options">
        <label class="book-settings-option">
          <input type="radio" name="bs-lang" value="de" x-model="bookSettingsLanguage" @change="bookSettingsRegion = (bookSettingsLanguage === 'de' ? 'CH' : 'US'); bookSettingsBuchtyp = ''">
          Deutsch
        </label>
        <label class="book-settings-option">
          <input type="radio" name="bs-lang" value="en" x-model="bookSettingsLanguage" @change="bookSettingsRegion = (bookSettingsLanguage === 'de' ? 'CH' : 'US'); bookSettingsBuchtyp = ''">
          English
        </label>
      </div>
    </div>

    <div class="book-settings-row">
      <label class="book-settings-label">Region</label>
      <div class="book-settings-options">
        <template x-if="bookSettingsLanguage === 'de'">
          <div class="book-settings-options">
            <label class="book-settings-option">
              <input type="radio" name="bs-region" value="CH" x-model="bookSettingsRegion">
              Schweiz (de-CH)
            </label>
            <label class="book-settings-option">
              <input type="radio" name="bs-region" value="DE" x-model="bookSettingsRegion">
              Deutschland (de-DE)
            </label>
          </div>
        </template>
        <template x-if="bookSettingsLanguage === 'en'">
          <div class="book-settings-options">
            <label class="book-settings-option">
              <input type="radio" name="bs-region" value="US" x-model="bookSettingsRegion">
              USA (en-US)
            </label>
            <label class="book-settings-option">
              <input type="radio" name="bs-region" value="GB" x-model="bookSettingsRegion">
              United Kingdom (en-GB)
            </label>
          </div>
        </template>
      </div>
    </div>

    <div class="book-settings-row">
      <label class="book-settings-label" for="bs-buchtyp">Buchtyp</label>
      <select id="bs-buchtyp" class="book-settings-select" x-model="bookSettingsBuchtyp">
        <option value="">— nicht klassifiziert —</option>
        <template x-for="typ in bookSettingsBuchtypen()" :key="typ.key">
          <option :value="typ.key" x-text="typ.label"></option>
        </template>
      </select>
    </div>

    <div class="book-settings-row book-settings-row--top">
      <label class="book-settings-label" for="bs-buchkontext">Weiterer Kontext</label>
      <div class="book-settings-kontext-wrap">
        <textarea
          id="bs-buchkontext"
          class="book-settings-textarea"
          x-model="bookSettingsBuchKontext"
          placeholder="z.B. Schauplatz: Zürich, 1970er Jahre. Atmosphäre: dunkel, melancholisch. Besonderheiten: Die Hauptfigur leidet an Amnesie – Erinnerungslücken sind absichtlich."
          rows="4"
          maxlength="1000"
        ></textarea>
        <p class="book-settings-hint" x-text="(bookSettingsBuchKontext || '').length + ' / 1000'"></p>
      </div>
    </div>

    <p class="book-settings-saved" x-show="bookSettingsSaved">Einstellungen gespeichert.</p>
    <p class="book-settings-error" x-show="bookSettingsError" x-text="bookSettingsError"></p>
  </div>
</div>
