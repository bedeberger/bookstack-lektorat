<!-- Figurenübersicht -->
<div class="card" x-show="showFiguresCard" x-cloak x-transition>
  <div class="card-header">
    <span class="card-title" x-text="'Figuren: ' + selectedBookName"></span>
    <span x-show="figurenUpdatedAt && !figurenLoading" class="figuren-updated-at" x-text="'Letzte Analyse: ' + formatDate(figurenUpdatedAt)"></span>
    <div class="card-actions">
      <button @click="runFigurExtraction()" :disabled="figurenLoading">
        <span x-show="figurenLoading" class="spinner"></span>
        <span x-text="figuren.length ? 'Neu ermitteln' : 'Figuren ermitteln'"></span>
      </button>
    </div>
  </div>

  <!-- Fortschritt -->
  <div x-show="figurenProgress > 0" class="progress-bar-wrap">
    <div class="progress-bar" :style="'width:' + figurenProgress + '%'"></div>
  </div>
  <div x-show="figurenStatus" class="figur-progress-status" x-html="figurenStatus"></div>

  <!-- Graph -->
  <div x-show="figuren.length > 0" class="figur-graph-section">

    <!-- Modus-Toggle -->
    <div class="figur-modus-toggle">
      <button class="figur-modus-btn" :class="{ 'figur-modus-btn--active': figurenGraphModus === 'figur' }" @click="figurenGraphModus !== 'figur' && toggleFigurenGraphModus()">Figurengraph</button>
      <button class="figur-modus-btn" :class="{ 'figur-modus-btn--active': figurenGraphModus === 'soziogramm' }" @click="figurenGraphModus !== 'soziogramm' && toggleFigurenGraphModus()">Soziogramm</button>
    </div>

    <!-- Legende Figurengraph -->
    <template x-if="figurenGraphModus === 'figur'">
      <div>
        <div class="figur-legend">
          <span class="figur-legend-dot figur-legend-dot--hauptfigur"></span>Hauptfigur
          <span class="figur-legend-dot figur-legend-dot--antagonist"></span>Antagonist
          <span class="figur-legend-dot figur-legend-dot--mentor"></span>Mentor
          <span class="figur-legend-dot figur-legend-dot--nebenfigur"></span>Nebenfigur
          <span class="figur-legend-dot figur-legend-dot--andere"></span>Andere
        </div>
        <div class="figur-legend figur-legend--edges">
          <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--eltern"></span>Eltern</span>
          <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--geschwister"></span>Geschwister</span>
          <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--freund"></span>Freund</span>
          <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--feind"></span>Feind</span>
          <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--liebesbeziehung"></span>Liebesbeziehung</span>
          <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--patronage"></span>Patronage</span>
          <span class="figur-legend-entry"><span class="figur-edge-line figur-edge-line--geschaeft"></span>Geschäft</span>
        </div>
      </div>
    </template>

    <!-- Legende Soziogramm -->
    <template x-if="figurenGraphModus === 'soziogramm'">
      <div>
        <div class="figur-legend figur-legend--soziogramm">
          <span class="figur-legend-dot figur-legend-dot--adel"></span>Adel
          <span class="figur-legend-dot figur-legend-dot--klerus"></span>Klerus
          <span class="figur-legend-dot figur-legend-dot--grossbuergertum"></span>Großbürgertum
          <span class="figur-legend-dot figur-legend-dot--buergertum"></span>Bürgertum
          <span class="figur-legend-dot figur-legend-dot--kleinbuergertum"></span>Kleinbürgertum
          <span class="figur-legend-dot figur-legend-dot--arbeiterklasse"></span>Arbeiterklasse
          <span class="figur-legend-dot figur-legend-dot--unterwelt"></span>Unterwelt
        </div>
        <div class="figur-soziogramm-hint">
          Pfeilstärke = Machtasymmetrie · Knotenzeilen = Gesellschaftsschicht · Pfeilrichtung = Mächtiger → Schwächerer
        </div>
        <div class="figur-soziogramm-actions">
          <button @click="runSoziogrammEnrichment()" :disabled="soziogrammLoading || !figuren.length">
            <span x-show="soziogrammLoading" class="spinner"></span>
            Sozialschichten analysieren
          </button>
          <span x-show="soziogrammStatus" class="figur-sozio-status" x-html="soziogrammStatus"></span>
        </div>
        <div x-show="soziogrammProgress > 0" class="progress-bar-wrap">
          <div class="progress-bar" :style="'width:' + soziogrammProgress + '%'"></div>
        </div>
      </div>
    </template>

    <div class="figuren-graph-toolbar">
      <button class="graph-tool-btn" title="Zoom in" @click="_figurenNetwork && _figurenNetwork.moveTo({ scale: _figurenNetwork.getScale() * 1.3, animation: { duration: 200, easingFunction: 'easeInOutQuad' } })">+</button>
      <button class="graph-tool-btn" title="Zoom out" @click="_figurenNetwork && _figurenNetwork.moveTo({ scale: _figurenNetwork.getScale() * 0.77, animation: { duration: 200, easingFunction: 'easeInOutQuad' } })">−</button>
      <button class="graph-tool-btn graph-tool-btn--reset" title="Ansicht zurücksetzen" @click="_figurenNetwork && _figurenNetwork.fit({ animation: { duration: 300, easingFunction: 'easeInOutQuad' } })">&#x26F6;</button>
    </div>
    <div id="figuren-graph" class="figuren-graph-container"></div>
    <div id="figur-tooltip" class="figur-tooltip"></div>
  </div>

 

  <!-- Figurenliste -->
  <div x-show="figuren.length > 0" class="figur-list-section">
    <div class="figur-list-header">
      <div class="history-heading">Figuren</div>
    </div>

     <!-- Filter -->
    <div x-show="figuren.length > 0 && figurenKapitelListe().length > 0" class="szenen-filter-bar">
      <div x-data="combobox('Kapitel…', 'Alle Kapitel')"
          x-modelable="value" x-model="figurenKapitelFilter"
          x-effect="options = figurenKapitelListe().map(k => ({value: k, label: k}))"
          @combobox-change="figurenSeitenFilter = ''; selectedFigurId = null"
          @click.outside="close()" @keydown="onKeydown($event)"
          class="combobox-wrap combobox-wrap--compact">
      </div>
      <div x-data="combobox('Seite…', 'Alle Seiten')"
          x-modelable="value" x-model="figurenSeitenFilter"
          x-effect="_disabled = !figurenKapitelFilter || figurenSeitenListe().length === 0; options = figurenSeitenListe().map(s => ({value: s, label: s}))"
          @combobox-change="selectedFigurId = null"
          @click.outside="close()" @keydown="onKeydown($event)"
          :class="{'combobox-wrap--disabled': _disabled}"
          class="combobox-wrap combobox-wrap--compact">
      </div>
      <span class="szenen-filter-count" x-text="filteredFiguren().length + ' / ' + figuren.length"></span>
    </div>

    <template x-for="f in filteredFiguren()" :key="f.id">
      <div>
        <div class="figur-item" :data-figid="f.id" @click="selectedFigurId = selectedFigurId === f.id ? null : f.id;">
          <span class="figur-typ-dot" :style="'background:' + ({ hauptfigur:'var(--color-primary)', nebenfigur:'var(--color-muted)', antagonist:'var(--color-err-border)', mentor:'var(--color-ok-border)', andere:'var(--color-accent)' }[f.typ] || 'var(--color-border)')"></span>
          <span class="figur-name" x-text="f.name"></span>
          <span class="tag" x-text="f.typ"></span>
          <span x-show="f.geburtstag" class="tag" x-text="'* ' + f.geburtstag"></span>
          <!-- Kapitel-Badges -->
          <template x-if="f.kapitel?.length">
            <span class="figur-kapitel-badges">
              <span class="figur-kapitel-primary internal-link" x-text="f.kapitel[0].name" @click.stop="figurenKapitelFilter = f.kapitel[0].name; figurenSeitenFilter = ''"></span>
              <template x-if="f.kapitel.length > 1">
                <span class="figur-kapitel-more" x-text="'+' + (f.kapitel.length - 1)"></span>
              </template>
            </span>
          </template>
          <span class="history-chevron" :class="{ open: selectedFigurId === f.id }">›</span>
        </div>
        <div x-show="selectedFigurId === f.id" class="figur-detail">
          <p x-show="f.beschreibung" x-text="f.beschreibung" class="figur-beschreibung"></p>
          <!-- Beruf + Sozialschicht -->
          <div x-show="f.beruf || f.sozialschicht" class="figur-detail-row">
            <span x-show="f.beruf" class="bewertung-section-title bewertung-section-title--inline">Beruf:&nbsp;</span>
            <span x-show="f.beruf" class="figur-detail-value" x-text="f.beruf"></span>
            <span x-show="f.sozialschicht" class="tag figur-sozialschicht-badge" :class="'figur-schicht-' + f.sozialschicht" x-text="({ adel:'Adel', klerus:'Klerus', grossbuergertum:'Großbürgertum', buergertum:'Bürgertum', kleinbuergertum:'Kleinbürgertum', arbeiterklasse:'Arbeiterklasse', unterwelt:'Unterwelt', andere:'—' })[f.sozialschicht] || f.sozialschicht"></span>
          </div>
          <!-- Kapitelauftritte -->
          <div class="figur-kapitelauftritte" x-show="f.kapitel?.length > 1">
            <div class="bewertung-section-title">Kapitelauftritte</div>
            <div class="figur-tags-row">
              <template x-for="(k, ki) in (f.kapitel || [])" :key="ki">
                <span class="tag internal-link" @click="figurenKapitelFilter = k.name; figurenSeitenFilter = ''" x-text="ki === 0 ? k.name : k.name + (k.haeufigkeit > 1 ? ' ×' + k.haeufigkeit : '')"></span>
              </template>
            </div>
          </div>
          <div x-show="f.eigenschaften?.length">
            <div class="bewertung-section-title">Eigenschaften</div>
            <ul class="bullet-list figur-eigenschaften-list">
              <template x-for="(e, i) in (f.eigenschaften || [])" :key="i">
                <li x-text="e"></li>
              </template>
            </ul>
          </div>
          <!-- Familie -->
          <div x-show="f.eltern_ids?.length || f.geschwister_ids?.length">
            <div class="bewertung-section-title">Familie</div>
            <div class="figur-tags-row">
              <template x-for="pid in (f.eltern_ids || [])" :key="'e'+pid">
                <span class="tag figur-rel-tag internal-link" title="Elternteil" @click.stop="openFigurById(pid)" x-text="'↑ ' + (figuren.find(x => x.id === pid)?.name || pid)"></span>
              </template>
              <template x-for="sid in (f.geschwister_ids || [])" :key="'s'+sid">
                <span class="tag figur-rel-tag internal-link" title="Geschwister" @click.stop="openFigurById(sid)" x-text="'⇔ ' + (figuren.find(x => x.id === sid)?.name || sid)"></span>
              </template>
            </div>
          </div>
          <!-- Beziehungen -->
          <div x-show="f.beziehungen?.length">
            <div class="bewertung-section-title">Beziehungen</div>
            <div class="figur-bz-list">
              <template x-for="(bz, i) in (f.beziehungen || [])" :key="i">
                <div class="figur-beziehung-item">
                  <span class="figur-bz-typ" :class="'figur-bz-' + bz.typ" x-text="bz.typ"></span>
                  <span class="figur-bz-name internal-link" @click.stop="openFigurById(bz.figur_id)" x-text="figuren.find(x => x.id === bz.figur_id)?.name || bz.figur_id"></span>
                  <span x-show="bz.machtverhaltnis && bz.machtverhaltnis !== 0" class="figur-bz-macht" :class="bz.machtverhaltnis > 0 ? 'figur-bz-macht--positiv' : 'figur-bz-macht--negativ'" x-text="bz.machtverhaltnis > 0 ? '↑'.repeat(Math.abs(bz.machtverhaltnis)) : '↓'.repeat(Math.abs(bz.machtverhaltnis))"></span>
                  <span x-show="bz.beschreibung" class="figur-bz-hint" x-text="'– ' + bz.beschreibung"></span>
                </div>
              </template>
            </div>
          </div>
          <!-- Lebensereignisse / Zeitstrahl -->
          <div x-show="f.lebensereignisse?.length">
            <div class="bewertung-section-title">Zeitstrahl</div>
            <div class="global-zeitstrahl-body">
              <template x-for="(ev, i) in (f.lebensereignisse || [])" :key="i">
                <div class="gz-item" :class="ev.typ === 'extern' ? 'gz-item--extern' : ''">
                  <div class="gz-marker" :class="ev.typ === 'extern' ? 'gz-marker--extern' : ''"></div>
                  <div class="gz-content">
                    <div class="gz-datum-row">
                      <span class="gz-datum" x-text="ev.datum"></span>
                      <template x-if="ev.typ === 'extern'">
                        <span class="gz-extern-badge">extern</span>
                      </template>
                    </div>
                    <div class="gz-ereignis" x-text="ev.ereignis"></div>
                    <div x-show="ev.kapitel" class="gz-kapitel">
                      <span class="gz-kapitel-link internal-link" x-text="ev.kapitel" @click="openEreignisseMitKapitel(ev.kapitel)"></span>
                    </div>
                    <div x-show="ev.bedeutung" class="gz-bedeutung" x-text="ev.bedeutung"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

</div>
